              <button class="btn btn-s ai-secondary" ${draftCount?'':'disabled'} onclick="importAIDraft()">确认导入题库</button>
              <button class="btn btn-s ai-quiet" onclick="curTab='bank';renderNav();renderTab()">去题库查看</button>
            </div>
          </div>
        </div>
        <div class="ai-preview-wrap">
          ${draftCount?`<div class="ai-preview">
            ${draft.items.map(item=>`
              <div class="ai-item">
                <div class="ai-item-h">
                  <span class="ai-badge">${escapeHtml(item.projectName||'默认分组')}</span>
                  <span class="ai-badge">${escapeHtml(item.source||'simulation')}</span>
                  <span class="ai-conf">${item.confidence!=null?`置信度 ${Math.round(item.confidence*100)}%`:'预览稿'}</span>
                </div>
                <div class="ai-item-q">${escapeHtml(item.question)}</div>
                <div class="ai-item-a">${escapeHtml(item.answer)}</div>
                <div class="ai-item-ft">
                  ${(item.keywords||[]).map(k=>`<span class="kw">${escapeHtml(k)}</span>`).join('')}
                  <span class="del-link" onclick="removeAIDraftItem('${item.id}')">移除</span>
                </div>
              </div>`).join('')}
          </div>`:`
            <div class="ai-empty-card">
              <div class="ai-empty-hero">
                <div class="ai-empty-ico">📝</div>
                <div>
                  <h4>预览区还没有内容</h4>
                  <p>先让模拟面试跑起来，等你拿到几轮问答后，再点击“预览整理结果”。</p>
                </div>
              </div>
              <div class="ai-mini-divider"></div>
              <div class="ai-empty-list">
                <div class="ai-empty-item"><span>1</span><div>模拟过程中最多推进 10 道项目问题。</div></div>
                <div class="ai-empty-item"><span>2</span><div>到达上限后会提示“此项目题库已完成，建议先预览保存”。</div></div>
                <div class="ai-empty-item"><span>3</span><div>预览通过后，再一键保存 Markdown 或确认导入题库。</div></div>
              </div>
            </div>`}
        </div>
      </div>
    </div>
  </div>`;
}

// ============ BANK ============
function renderBank(m){
  const projs=[{id:'all',name:'全部'},...state.projects];
  m.innerHTML=`<div class="fade">
    <div class="sec-t">📋 面试问答题库</div>
    <div class="filters" id="projBar">${projs.map(p=>`<div class="f-chip ${state.projFilter===p.id?'on':''}" onclick="state.projFilter='${p.id}';save();renderBank(document.getElementById('main'))">${p.name}</div>`).join('')}</div>
    <div class="filters" id="lvBar">
      ${[['all','全部'],['red','🔴 不熟'],['yellow','🟡 大概'],['green','🟢 熟练']].map(([v,l])=>`<div class="f-chip ${state.filter===v?'on':''}" onclick="state.filter='${v}';save();renderBank(document.getElementById('main'))">${l}</div>`).join('')}
    </div>
    <div id="qaList"></div>
  </div>`;
  let qs=state.questions;
  if(state.projFilter!=='all')qs=qs.filter(q=>q.project===state.projFilter);
  if(state.filter!=='all')qs=qs.filter(q=>q.level===state.filter);
  const pName=id=>{const p=state.projects.find(x=>x.id===id);return p?p.name:''};
  document.getElementById('qaList').innerHTML=qs.length?qs.map(q=>`
    <div class="qa" id="qa-${q.id}">
      <div class="qa-h" onclick="document.getElementById('qa-${q.id}').classList.toggle('open')">
        <div class="qa-dot ${q.level}"></div>
        <div class="qa-q">${q.q}</div>
        <span class="qa-proj">${pName(q.project)}</span>
        <span class="qa-arr">▼</span>
      </div>
      <div class="qa-b">
        ${q.keywords.length?`<div class="qa-kw">${q.keywords.map(k=>`<span class="kw">${k}</span>`).join('')}</div>`:''}
        <div class="qa-ans">${q.answer}</div>
        <div class="qa-ft">
          <span class="qa-meta">下次复习：${describeNextReview(q)}</span>
          <button class="lv-btn ${q.level==='red'?'ar':''}" onclick="setLv(${q.id},'red')">🔴 不熟</button>
          <button class="lv-btn ${q.level==='yellow'?'ay':''}" onclick="setLv(${q.id},'yellow')">🟡 大概</button>
          <button class="lv-btn ${q.level==='green'?'ag':''}" onclick="setLv(${q.id},'green')">🟢 熟练</button>
          <button class="lv-btn" onclick="openEditModal(${q.id})">编辑</button>
          <span class="del-link" onclick="delQ(${q.id})">删除</span>
        </div>
      </div>
    </div>`).join(''):`<div class="empty"><div class="emo">📝</div><p>${state.questions.length?'没有符合当前筛选条件的题目':'还没有题目，去「导入问答」页面添加吧'}</p></div>`;
}

function setLv(id,lv){const q=state.questions.find(x=>x.id===id);if(q){setManualSchedule(q,lv);save();renderBank(document.getElementById('main'));updateHd()}}
function delQ(id){if(!confirm('删除这道题？'))return;state.questions=state.questions.filter(q=>q.id!==id);save();renderBank(document.getElementById('main'));updateHd()}

function escapeHtml(s){
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ============ FLASH ============
let fcIdx=0,fcQ=[],fcMode='all';
function getFlashProjectQuestions(){
  return state.flashProjFilter!=='all'
    ? state.questions.filter(q=>q.project===state.flashProjFilter)
    : state.questions;
}
function renderFlash(m){
  const base=getFlashProjectQuestions();
  const flashProjOptions=[{id:'all',name:'全部'},...state.projects];
  const filterBar=`<div class="fc-filters">${flashProjOptions.map(p=>`<div class="f-chip ${state.flashProjFilter===p.id?'on':''}" onclick="state.flashProjFilter='${p.id}';save();renderFlash(document.getElementById('main'))">${p.name}</div>`).join('')}</div>`;
  const due=sortByReviewPriority(base.filter(q=>isDue(q)));
  fcMode=due.length?'due':'upcoming';
  fcQ=due.length?due:sortByReviewPriority(base);
  fcIdx=0;
  m.innerHTML='<div class="fc-wrap" id="fcWrap"></div>';
  if(!fcQ.length){document.getElementById('fcWrap').innerHTML=`${filterBar}<div class="empty"><div class="emo">🃏</div><p>${state.questions.length?'当前项目下还没有可练习的题目':'先去「导入问答」添加题目'}</p></div>`;return}
  renderFc();
}
function renderFc(){
  const w=document.getElementById('fcWrap');
  const flashProjOptions=[{id:'all',name:'全部'},...state.projects];
  const selectedProj=state.projects.find(x=>x.id===state.flashProjFilter);
  const filterBar=`<div class="fc-filters">${flashProjOptions.map(p=>`<div class="f-chip ${state.flashProjFilter===p.id?'on':''}" onclick="state.flashProjFilter='${p.id}';save();renderFlash(document.getElementById('main'))">${p.name}</div>`).join('')}</div>`;
  if(fcIdx>=fcQ.length){w.innerHTML=`${filterBar}<div class="empty fade"><div class="emo">🎉</div><p>本轮完成！共练习 ${fcQ.length} 题${selectedProj?` · ${selectedProj.name}`:''}</p><button class="btn btn-p" style="margin-top:14px" onclick="renderFlash(document.getElementById('main'))">再来一轮</button></div>`;return}
  const q=fcQ[fcIdx],p=state.projects.find(x=>x.id===q.project),pct=(fcIdx/fcQ.length*100).toFixed(0);
  w.innerHTML=`
    ${filterBar}
    <div class="fc-note">${selectedProj?`当前项目：${selectedProj.name} · `:''}${fcMode==='due'?'正在优先复习已到期题目':'当前没有到期题，先预习下一批题目'} · ${describeNextReview(q)}</div>
    <div class="fc-prog"><span>${fcIdx+1} / ${fcQ.length}</span><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div><span>${pct}%</span></div>
    <div class="fc fade" id="fc" onclick="document.getElementById('fc').classList.toggle('flip')">
      <div class="fc-in">
        <div class="fc-f">
          ${p?`<div class="fc-proj">${p.name}</div>`:''}
          <div class="fc-lbl">面试问题</div>
          <div class="fc-qtxt">${q.q}</div>
          <div class="fc-hint">先在脑中组织答案，再点击翻转查看 →</div>
        </div>
        <div class="fc-bk">
          <div class="fc-lbl" style="color:var(--green)">参考答案</div>
          ${q.keywords.length?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px">${q.keywords.map(k=>`<span class="kw">${k}</span>`).join('')}</div>`:''}
          <div class="fc-atxt">${q.answer}</div>
        </div>
      </div>
    </div>
    <div class="fc-acts">
      <button class="fc-btn br" onclick="fcRate('red')">😟 不熟<small>稍后再练</small></button>
      <button class="fc-btn by" onclick="fcRate('yellow')">🤔 大概<small>明天复习</small></button>
      <button class="fc-btn bg" onclick="fcRate('green')">😎 熟练<small>间隔加长</small></button>
    </div>`;
}
function fcRate(lv){
  const q=fcQ[fcIdx],o=state.questions.find(x=>x.id===q.id);
  if(o)scheduleQuestion(o,lv,{source:'flash'});
  save();updateHd();fcIdx++;renderFc();
}
function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

// ============ VOICE ============
let vTimer=null,vSec=0,vQ=null,vRun=false;
function renderVoice(m){
  const due=sortByReviewPriority(state.questions.filter(q=>isDue(q)&&q.level!=='green'));
  const pool=due.length?due:sortByReviewPriority(state.questions.filter(q=>q.level!=='green'));
  const all=pool.length?pool:sortByReviewPriority(state.questions);
  m.innerHTML='<div class="vc-wrap" id="vcWrap"></div>';
  if(!all.length){document.getElementById('vcWrap').innerHTML='<div class="empty"><div class="emo">🎙️</div><p>先去添加题目</p></div>';return}
  const candidatePool=all.slice(0,Math.min(5,all.length));
  vQ=candidatePool[Math.floor(Math.random()*candidatePool.length)];vSec=0;vRun=false;if(vTimer)clearInterval(vTimer);
  const p=state.projects.find(x=>x.id===vQ.project);
  document.getElementById('vcWrap').innerHTML=`
    <div class="vc-card fade">
      ${p?`<div class="vc-proj">${p.name}</div>`:''}
      <div class="vc-qtxt">${vQ.q}</div>
      <div class="timer" id="tmr">00:00</div>
      <div class="timer-l">回答计时 · ${describeNextReview(vQ)}</div>
    </div>
    <div class="vc-ctrls">
      <button class="vc-btn" id="tBtn" onclick="togTmr()" title="开始/暂停">▶</button>
      <button class="vc-btn" onclick="rstTmr()" title="重置">↺</button>
      <button class="vc-btn" onclick="renderVoice(document.getElementById('main'))" title="下一题">→</button>
    </div>
    <div class="sr">
      <h3>自我评分</h3>
      <div class="stars">${[1,2,3,4,5].map(n=>`<div class="star" onclick="rateSelf(${n})" id="s${n}">★</div>`).join('')}</div>
      <button class="rev-btn" onclick="document.getElementById('rAns').classList.toggle('show')">👁 查看参考答案</button>
      <div class="rev-ans" id="rAns">${vQ.keywords.length?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">${vQ.keywords.map(k=>`<span class="kw">${k}</span>`).join('')}</div>`:''}${vQ.answer}</div>
    </div>`;
}
function togTmr(){const b=document.getElementById('tBtn');if(vRun){clearInterval(vTimer);b.textContent='▶';b.classList.remove('rec');vRun=false}else{b.textContent='⏸';b.classList.add('rec');vRun=true;vTimer=setInterval(()=>{vSec++;document.getElementById('tmr').textContent=String(Math.floor(vSec/60)).padStart(2,'0')+':'+String(vSec%60).padStart(2,'0')},1000)}}
function rstTmr(){clearInterval(vTimer);vSec=0;vRun=false;document.getElementById('tBtn').textContent='▶';document.getElementById('tBtn').classList.remove('rec');document.getElementById('tmr').textContent='00:00'}
function rateSelf(n){
  for(let i=1;i<=5;i++)document.getElementById('s'+i).classList.toggle('on',i<=n);
  if(vQ){
    const o=state.questions.find(x=>x.id===vQ.id);
    if(o){
      o.score=n;
      scheduleQuestion(o,n<=2?'red':n<=4?'yellow':'green',{source:'voice',score:n,sec:vSec});
      save();
      updateHd();
    }
  }
}

// ============ DAILY ============
function renderDaily(m){
  if(!state.questions.length){m.innerHTML='<div class="empty"><div class="emo">📅</div><p>先去添加题目</p></div>';return}
  const due=sortByReviewPriority(state.questions.filter(q=>isDue(q)));
  const upcoming=sortByReviewPriority(state.questions.filter(q=>!isDue(q)));
  const morning=due.filter(q=>q.level!=='green').slice(0,8);
  const noon=(due.length?due:upcoming).slice(0,3);
  const today=state.questions.filter(q=>q.lastPracticed&&new Date(q.lastPracticed).toDateString()===new Date().toDateString());
  const pn=id=>{const p=state.projects.find(x=>x.id===id);return p?p.name:''};
  m.innerHTML=`<div class="daily fade">
    <div class="sec-t">📅 今日练习计划</div>
    <div class="sec-desc">根据题目的到期时间自动生成，优先安排今天该复习的题目。当前待复习 <strong>${due.length}</strong> 题。</div>
    <div class="tb"><div class="tb-time">早上</div><div class="tb-dot"></div><div class="tb-c">
      <h4>☀️ 到期闪卡复习 · 15分钟</h4><p>先过今天已经到期的题，优先把记忆快掉的内容捞起来</p>
      <div class="tl">${morning.length?morning.map(q=>`<div class="ti"><div class="tc" onclick="this.classList.toggle('ck');this.parentElement.classList.toggle('dn')">✓</div><span class="qa-dot ${q.level}" style="width:6px;height:6px"></span><span>${q.q.length>28?q.q.substring(0,28)+'…':q.q}</span><span style="color:var(--ink4)">· ${describeNextReview(q)}</span></div>`).join(''):'<div style="color:var(--ink4);font-size:12px">今天没有待复习题，状态很好 🎉</div>'}</div>
    </div></div>
    <div class="tb"><div class="tb-time">中午</div><div class="tb-dot"></div><div class="tb-c">
      <h4>🎙️ 出声练习 · 10分钟</h4><p>${due.length?'优先拿到期题做口头输出':'当前没有到期题，先预习最近将要复习的题'}</p>
      <div class="tl">${noon.length?noon.map(q=>`<div class="ti"><div class="tc" onclick="this.classList.toggle('ck');this.parentElement.classList.toggle('dn')">✓</div><span class="qa-dot ${q.level}" style="width:6px;height:6px"></span><span>${q.q.length>28?q.q.substring(0,28)+'…':q.q}</span><span style="color:var(--ink4)">· ${pn(q.project)}</span></div>`).join(''):'<div style="color:var(--ink4);font-size:12px">暂无可安排题目</div>'}</div>
    </div></div>
    <div class="tb"><div class="tb-time">晚上</div><div class="tb-dot"></div><div class="tb-c">
      <h4>🌙 回顾与更新 · 5分钟</h4><p>回顾今天练过的题，看看下一次会在什么时候再次出现</p>
      <div class="tl">${today.length?today.map(q=>`<div class="ti"><div class="tc" onclick="this.classList.toggle('ck');this.parentElement.classList.toggle('dn')">✓</div><span>${q.q.length>28?q.q.substring(0,28)+'…':q.q} (${q.practiced}次)</span><span style="color:var(--ink4)">· 下次${describeNextReview(q)}</span></div>`).join(''):'<div style="color:var(--ink4);font-size:12px">今天还没练习，快开始吧</div>'}</div>
    </div></div>
  </div>`;
}

// ============ STATS ============
function renderStats(m){
  const qs=state.questions,total=qs.length;
  if(!total){m.innerHTML='<div class="empty"><div class="emo">📊</div><p>添加题目后这里会显示统计数据</p></div>';return}
  const r=qs.filter(q=>q.level==='red').length,y=qs.filter(q=>q.level==='yellow').length,g=qs.filter(q=>q.level==='green').length;
  const tp=qs.reduce((a,q)=>a+q.practiced,0);
  const scored=qs.filter(q=>q.score>0),avg=scored.length?(scored.reduce((a,q)=>a+q.score,0)/scored.length).toFixed(1):'-';
  const due=qs.filter(q=>isDue(q)).length;
  const avgInterval=qs.length?(qs.reduce((a,q)=>a+(q.intervalDays||0),0)/qs.length).toFixed(1):'0';
  const rp=total?(r/total*100).toFixed(0):0,yp=total?(y/total*100).toFixed(0):0,gp=total?(g/total*100).toFixed(0):0;
  const projStats=state.projects.map(p=>{const pqs=qs.filter(q=>q.project===p.id);const pg=pqs.filter(q=>q.level==='green').length;return{name:p.name,total:pqs.length,green:pg,pct:pqs.length?(pg/pqs.length*100).toFixed(0):0}}).filter(p=>p.total>0);

  m.innerHTML=`<div class="fade">
    <div class="sec-t">📊 学习统计</div>
    <div class="st-grid">
      <div class="st-card"><div class="st-num" style="color:var(--accent)">${total}</div><div class="st-lbl">总题数</div></div>
      <div class="st-card"><div class="st-num" style="color:var(--red)">${due}</div><div class="st-lbl">待复习</div></div>
      <div class="st-card"><div class="st-num" style="color:var(--green)">${tp}</div><div class="st-lbl">练习次数</div></div>
      <div class="st-card"><div class="st-num" style="color:var(--yellow)">${avg}</div><div class="st-lbl">平均评分</div></div>
      <div class="st-card"><div class="st-num" style="color:var(--blue)">${avgInterval}</div><div class="st-lbl">平均间隔(天)</div></div>
    </div>
    <div class="ms-chart"><h3>掌握程度分布</h3>
      <div class="ms-row"><div class="ms-lbl">🔴 不熟</div><div class="ms-bar"><div class="ms-fill r" style="width:${rp}%">${r}</div></div></div>
      <div class="ms-row"><div class="ms-lbl">🟡 大概</div><div class="ms-bar"><div class="ms-fill y" style="width:${yp}%">${y}</div></div></div>
      <div class="ms-row"><div class="ms-lbl">🟢 熟练</div><div class="ms-bar"><div class="ms-fill g" style="width:${gp}%">${g}</div></div></div>
    </div>
    <div class="ms-chart"><h3>复习调度状态</h3>
      <div class="ms-row"><div class="ms-lbl">现在该练</div><div class="ms-bar"><div class="ms-fill r" style="width:${total?(due/total*100).toFixed(0):0}%">${due}</div></div></div>
      <div class="ms-row"><div class="ms-lbl">已排计划</div><div class="ms-bar"><div class="ms-fill g" style="width:${total?((total-due)/total*100).toFixed(0):0}%">${total-due}</div></div></div>
    </div>
    ${projStats.length?`<div class="ms-chart"><h3>各项目掌握率</h3>${projStats.map(s=>`<div class="ms-row"><div class="ms-lbl">${s.name}</div><div class="ms-bar"><div class="ms-fill g" style="width:${s.pct}%">${s.green}/${s.total}</div></div></div>`).join('')}</div>`:''}
  </div>`;
}
