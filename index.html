<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>面试记忆本</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#faf8f4;--white:#fff;--card:#fff;
  --sand:#f3efe8;--sand2:#ebe6dc;--sand3:#ddd7ca;
  --ink:#2c2a25;--ink2:#5c584e;--ink3:#8a857a;--ink4:#b5b0a5;
  --accent:#c06838;--accent2:#d4845a;--accent-bg:rgba(192,104,56,.07);
  --green:#4a8c6f;--green-bg:rgba(74,140,111,.08);
  --yellow:#b8860b;--yellow-bg:rgba(184,134,11,.08);
  --red:#b04a3a;--red-bg:rgba(176,74,58,.08);
  --blue:#4a6fa5;--blue-bg:rgba(74,111,165,.08);
  --r:10px;--shadow:0 1px 4px rgba(0,0,0,.06);
}
body{background:var(--bg);color:var(--ink);font-family:'Noto Sans SC','Hiragino Sans GB',sans-serif;min-height:100vh;line-height:1.6}

/* === HEADER === */
.hd{padding:20px 32px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--sand2);background:var(--white);position:sticky;top:0;z-index:100}
.hd-icon{font-size:24px}
.hd-title{font-family:'Noto Serif SC',serif;font-size:20px;font-weight:700;color:var(--ink)}
.hd-sub{font-size:12px;color:var(--ink3);margin-left:4px}
.hd-stats{margin-left:auto;display:flex;gap:10px;flex-wrap:wrap}
.hd-b{display:flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:12px;color:var(--ink2);background:var(--sand)}
.hd-dot{width:7px;height:7px;border-radius:50%}

/* === NAV === */
.nav{display:flex;gap:2px;padding:12px 32px;background:var(--white);border-bottom:1px solid var(--sand2);overflow-x:auto}
.nav::-webkit-scrollbar{display:none}
.nav-t{padding:8px 18px;border-radius:8px;font-size:13px;cursor:pointer;transition:.2s;color:var(--ink3);white-space:nowrap;font-weight:500}
.nav-t:hover{color:var(--ink);background:var(--sand)}
.nav-t.on{background:var(--accent);color:#fff}

/* === MAIN === */
.main{max-width:860px;margin:0 auto;padding:24px 32px 60px}
.main.ai-main{max-width:1160px}
.sec-t{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:700;margin-bottom:16px;color:var(--ink);display:flex;align-items:center;gap:8px}
.sec-desc{font-size:13px;color:var(--ink3);margin-bottom:20px;line-height:1.7}
.tab{display:none}.tab.on{display:block}

/* === GUIDE === */
.guide-steps{display:flex;flex-direction:column;gap:16px;margin-bottom:24px}
.g-step{background:var(--white);border:1px solid var(--sand2);border-radius:var(--r);padding:20px 24px;position:relative;box-shadow:var(--shadow)}
.g-step::before{content:attr(data-step);position:absolute;top:-10px;left:20px;background:var(--accent);color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.g-step h4{font-size:14px;font-weight:600;margin-bottom:4px;color:var(--ink)}
.g-step p{font-size:13px;color:var(--ink2);line-height:1.7}
.g-tip{background:var(--accent-bg);border-left:3px solid var(--accent);border-radius:0 var(--r) var(--r) 0;padding:14px 18px;margin-top:16px;font-size:13px;color:var(--ink2);line-height:1.7}
.g-tip strong{color:var(--accent)}

/* === IMPORT === */
.import-area{background:var(--white);border:1px solid var(--sand2);border-radius:var(--r);padding:24px;margin-bottom:20px;box-shadow:var(--shadow)}
.import-area h3{font-size:15px;font-weight:600;margin-bottom:12px}
.imp-row{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.imp-row label{font-size:13px;font-weight:500;color:var(--ink2)}
.imp-input{width:100%;padding:10px 14px;border:1px solid var(--sand2);border-radius:8px;font-size:14px;font-family:inherit;color:var(--ink);background:var(--bg);outline:none;transition:border .2s}
.imp-input:focus{border-color:var(--accent)}
textarea.imp-input{min-height:120px;resize:vertical;line-height:1.7}
.imp-row-h{display:flex;gap:10px}
.imp-row-h>*{flex:1}
.imp-sel{padding:10px 14px;border:1px solid var(--sand2);border-radius:8px;font-size:13px;font-family:inherit;color:var(--ink);background:var(--bg);cursor:pointer;outline:none}
.imp-sel:focus{border-color:var(--accent)}
.kw-input-wrap{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.kw-input-wrap input{flex:1;min-width:120px}
.btn{padding:10px 22px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:.2s}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:var(--accent2)}
.btn-s{background:var(--sand);color:var(--ink2);border:1px solid var(--sand2)}.btn-s:hover{background:var(--sand2)}
.btn-d{background:transparent;color:var(--red);border:1px solid var(--red-bg)}.btn-d:hover{background:var(--red-bg)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.tip-btn{position:relative}
.tip-btn::before{content:'';position:absolute;left:22px;bottom:calc(100% + 6px);border:6px solid transparent;border-top-color:var(--ink);opacity:0;transform:translateY(4px);transition:opacity .2s ease,transform .2s ease;pointer-events:none}
.tip-btn::after{content:attr(data-tip);position:absolute;left:0;bottom:calc(100% + 16px);min-width:220px;max-width:280px;padding:10px 12px;border-radius:10px;background:var(--ink);color:#fff;font-size:12px;font-weight:500;line-height:1.65;box-shadow:0 10px 24px rgba(0,0,0,.14);opacity:0;transform:translateY(6px);transition:opacity .2s ease,transform .2s ease;pointer-events:none;white-space:normal;text-align:left;z-index:30}
.tip-btn:hover::before,.tip-btn:hover::after,.tip-btn:focus-visible::before,.tip-btn:focus-visible::after{opacity:1;transform:translateY(0)}

/* === BATCH IMPORT === */
.batch-area{background:var(--sand);border:2px dashed var(--sand3);border-radius:var(--r);padding:28px;text-align:center;margin-bottom:16px;cursor:pointer;transition:.2s}
.batch-area:hover{border-color:var(--accent);background:var(--accent-bg)}
.batch-area p{font-size:13px;color:var(--ink3);margin-top:6px}
.batch-hint{font-size:12px;color:var(--ink4);margin-bottom:16px;line-height:1.6;background:var(--sand);padding:12px 16px;border-radius:8px}

/* === AI WORKBENCH === */
.ai-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:16px}
.ai-stage{max-width:1120px;margin:0 auto}
.ai-stage .sec-desc{max-width:760px}
.ai-hero{max-width:760px;margin-bottom:14px}
.ai-kicker{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;background:var(--accent-bg);color:var(--accent);font-size:11px;font-weight:700;letter-spacing:.02em;margin-bottom:10px}
.ai-hero .sec-t{margin-bottom:8px;font-size:17px}
.ai-hero .sec-desc{margin-bottom:0;font-size:13px;line-height:1.8;color:var(--ink3)}
.ai-note{font-size:12px;color:var(--ink4);line-height:1.7;background:var(--sand);padding:12px 14px;border-radius:8px;margin-top:14px}
.ai-status{margin-top:12px;padding:12px 14px;border-radius:8px;font-size:12px;line-height:1.7;background:var(--sand);color:var(--ink2);display:none}
.ai-status.show{display:block}
.ai-status.ok{background:var(--green-bg);color:var(--green)}
.ai-status.err{background:var(--red-bg);color:var(--red)}
.ai-flow{display:flex;gap:12px;flex-wrap:wrap;margin:12px 0 22px}
.ai-step{flex:1;min-width:180px;background:var(--white);border:1px solid var(--sand2);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow)}
.ai-step.active{border-color:rgba(192,104,56,.28);box-shadow:0 8px 24px rgba(192,104,56,.08)}
.ai-step.done{background:linear-gradient(180deg,#fff,rgba(74,140,111,.04));border-color:rgba(74,140,111,.24)}
.ai-step-no{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:999px;background:var(--accent-bg);color:var(--accent);font-size:12px;font-weight:700;margin-bottom:10px}
.ai-step.done .ai-step-no{background:var(--green-bg);color:var(--green)}
.ai-step h4{font-size:14px;margin-bottom:4px}
.ai-step p{font-size:12px;line-height:1.7;color:var(--ink4)}
.ai-step-tag{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:4px 10px;border-radius:999px;font-size:11px;background:var(--sand);color:var(--ink3)}
.ai-step.done .ai-step-tag{background:var(--green-bg);color:var(--green)}
.ai-step.active .ai-step-tag{background:var(--accent-bg);color:var(--accent)}
.ai-panel{padding:26px 28px}
.ai-config-card{margin-bottom:24px}
.ai-config-grid{display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:12px}
.ai-shell{display:grid;grid-template-columns:minmax(0,1.16fr) minmax(360px,430px);gap:22px;align-items:start}
.ai-col{display:flex;flex-direction:column;gap:26px}
.ai-result-card{position:sticky;top:22px}
.ai-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:14px}
.ai-card-title h3{margin-bottom:4px}
.ai-card-sub{font-size:12px;color:var(--ink4);line-height:1.7}
.ai-chip-row{display:flex;gap:8px;flex-wrap:wrap}
.ai-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;font-size:11px;background:var(--sand);color:var(--ink3);white-space:nowrap}
.ai-chip strong{font-weight:700;color:var(--ink2)}
.ai-result-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
.ai-result-meta{font-size:12px;color:var(--ink4);line-height:1.7}
.ai-empty-card{background:linear-gradient(180deg,var(--sand),rgba(255,255,255,.88));border:1px dashed var(--sand3);border-radius:12px;padding:20px;min-height:320px;display:flex;flex-direction:column;justify-content:center}
.ai-empty-card h4{font-size:14px;margin-bottom:8px}
.ai-empty-card p{font-size:12px;color:var(--ink4);line-height:1.7;margin-bottom:10px}
.ai-empty-list{display:flex;flex-direction:column;gap:8px}
.ai-empty-item{display:flex;gap:8px;align-items:flex-start;font-size:12px;color:var(--ink3);line-height:1.7}
.ai-empty-item span{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:999px;background:var(--white);border:1px solid var(--sand2);font-size:11px;color:var(--accent);flex-shrink:0;margin-top:1px}
.ai-empty-hero{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ai-empty-ico{width:36px;height:36px;border-radius:12px;background:var(--white);border:1px solid var(--sand2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ai-preview-wrap{display:flex;flex-direction:column;gap:10px;min-height:360px;margin-top:16px}
.ai-files{margin-top:8px;font-size:12px;color:var(--ink4);line-height:1.7}
.ai-preview{display:flex;flex-direction:column;gap:10px}
.ai-item{background:var(--white);border:1px solid var(--sand2);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
.ai-item-h{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.ai-badge{padding:3px 10px;border-radius:999px;font-size:11px;background:var(--blue-bg);color:var(--blue)}
.ai-conf{font-size:11px;color:var(--ink4)}
.ai-item-q{font-size:14px;font-weight:600;margin-bottom:8px}
.ai-item-a{font-size:13px;line-height:1.8;color:var(--ink2);white-space:pre-wrap;margin-bottom:10px}
.ai-item-ft{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ai-empty{font-size:13px;color:var(--ink4);text-align:center;padding:36px 18px}
.ai-cta{min-width:140px}
.ai-secondary{background:var(--white);color:var(--accent);border:1px solid rgba(192,104,56,.22)}
.ai-secondary:hover{background:var(--accent-bg);border-color:rgba(192,104,56,.35)}
.ai-quiet{background:transparent;color:var(--ink3);border:1px solid transparent}
.ai-quiet:hover{background:var(--sand)}
.ai-actions-split{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.ai-actions-split .btn-p{padding:12px 24px}
.ai-input-note{font-size:12px;color:var(--ink4);line-height:1.7;background:var(--sand);border-radius:10px;padding:12px 14px}
.ai-result-panel{display:flex;flex-direction:column;gap:12px}
.ai-mini-divider{height:1px;background:var(--sand2)}
.local-map-preview{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.local-map-card{background:var(--sand);border:1px solid var(--sand2);border-radius:8px;padding:12px 14px}
.local-map-title{font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:8px}
.local-map-summary{font-size:12px;line-height:1.8;color:var(--ink3)}
.local-map-chips{display:flex;gap:6px;flex-wrap:wrap}
.local-map-list{display:flex;flex-direction:column;gap:8px}
.local-map-item{background:var(--white);border:1px solid var(--sand2);border-radius:8px;padding:10px 12px}
.local-map-item-q{font-size:12px;font-weight:600;line-height:1.7;color:var(--ink2);margin-top:6px}
.local-map-item-a{font-size:12px;line-height:1.7;color:var(--ink4);margin-top:4px;white-space:pre-wrap}

/* === Q&A LIST === */
.filters{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.f-chip{padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;background:var(--sand);color:var(--ink3);border:1px solid transparent;transition:.2s}
.f-chip:hover,.f-chip.on{color:var(--ink);background:var(--white);border-color:var(--sand3)}
.qa{background:var(--white);border:1px solid var(--sand2);border-radius:var(--r);margin-bottom:8px;box-shadow:var(--shadow);transition:.2s}
.qa:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.qa-h{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer;user-select:none}
.qa-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.qa-dot.red{background:var(--red)}.qa-dot.yellow{background:var(--yellow)}.qa-dot.green{background:var(--green)}
.qa-q{flex:1;font-size:14px;font-weight:500}
.qa-proj{padding:3px 10px;border-radius:12px;font-size:11px;background:var(--sand);color:var(--ink3)}
.qa-arr{color:var(--ink4);font-size:14px;transition:transform .3s}
.qa.open .qa-arr{transform:rotate(180deg)}
.qa-b{max-height:0;overflow:hidden;transition:max-height .4s ease}
.qa.open .qa-b{max-height:4000px}
.qa-kw{padding:4px 18px 8px;display:flex;gap:5px;flex-wrap:wrap}
.kw{padding:3px 9px;background:var(--accent-bg);border-radius:6px;font-size:11px;color:var(--accent)}
.qa-ans{padding:0 18px 14px;font-size:13px;line-height:1.85;color:var(--ink2);white-space:pre-wrap}
.qa-ft{display:flex;gap:6px;padding:4px 18px 14px;flex-wrap:wrap;align-items:center}
.qa-meta{font-size:11px;color:var(--ink4);margin-right:4px}
.lv-btn{padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid var(--sand2);background:var(--white);color:var(--ink3);font-family:inherit;transition:.2s}
.lv-btn:hover{border-color:var(--ink4)}
.lv-btn.ar{border-color:var(--red);color:var(--red);background:var(--red-bg)}
.lv-btn.ay{border-color:var(--yellow);color:var(--yellow);background:var(--yellow-bg)}
.lv-btn.ag{border-color:var(--green);color:var(--green);background:var(--green-bg)}
.del-link{margin-left:auto;font-size:11px;color:var(--ink4);cursor:pointer;text-decoration:underline}
.del-link:hover{color:var(--red)}

/* === FLASHCARD === */
.fc-wrap{display:flex;flex-direction:column;align-items:center;padding-top:20px}
.fc-filters{width:100%;align-self:flex-start;display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-start;margin-bottom:12px}
.fc-note{width:100%;max-width:780px;font-size:12px;color:var(--ink3);margin-bottom:10px;text-align:left}
.fc-prog{width:100%;max-width:780px;display:flex;align-items:center;gap:10px;margin-bottom:16px;font-size:12px;color:var(--ink3)}
.prog-bar{flex:1;height:4px;background:var(--sand);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .5s}
.fc{width:100%;max-width:780px;min-height:450px;perspective:1000px;cursor:pointer;margin-bottom:20px}
.fc-in{width:100%;min-height:450px;position:relative;transition:transform .6s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d}
.fc.flip .fc-in{transform:rotateY(180deg)}
.fc-f,.fc-bk{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r);padding:32px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;box-shadow:var(--shadow)}
.fc-f{background:var(--white);border:1px solid var(--sand2)}
.fc-bk{background:var(--white);border:1px solid var(--sand2);transform:rotateY(180deg);text-align:left;align-items:flex-start;justify-content:flex-start;overflow-y:auto}
.fc-lbl{font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:2px;margin-bottom:14px;font-weight:600}
.fc-qtxt{font-family:'Noto Serif SC',serif;font-size:19px;font-weight:700;line-height:1.6}
.fc-hint{margin-top:18px;font-size:12px;color:var(--ink4)}
.fc-atxt{font-size:13px;line-height:1.85;color:var(--ink2);white-space:pre-wrap}
.fc-proj{font-size:11px;color:var(--green);margin-bottom:6px;padding:3px 10px;background:var(--green-bg);border-radius:6px}
.fc-acts{display:flex;gap:10px;width:100%;max-width:780px}
.fc-btn{flex:1;padding:14px 10px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--sand2);background:var(--white);color:var(--ink);font-family:inherit;transition:.2s;text-align:center}
.fc-btn:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.06)}
.fc-btn.br:hover{border-color:var(--red);background:var(--red-bg)}
.fc-btn.by:hover{border-color:var(--yellow);background:var(--yellow-bg)}
.fc-btn.bg:hover{border-color:var(--green);background:var(--green-bg)}
.fc-btn small{display:block;font-size:10px;font-weight:400;color:var(--ink4);margin-top:2px}

/* === VOICE === */
.vc-wrap{display:flex;flex-direction:column;align-items:center;padding-top:20px}
.vc-card{width:100%;max-width:560px;background:var(--white);border:1px solid var(--sand2);border-radius:var(--r);padding:32px;text-align:center;margin-bottom:20px;box-shadow:var(--shadow)}
.vc-proj{display:inline-block;padding:4px 12px;border-radius:12px;font-size:11px;margin-bottom:8px;background:var(--blue-bg);color:var(--blue)}
.vc-qtxt{font-family:'Noto Serif SC',serif;font-size:20px;font-weight:700;line-height:1.5;margin-bottom:16px}
.timer{font-size:40px;font-weight:300;color:var(--accent);font-variant-numeric:tabular-nums;margin-bottom:4px}
.timer-l{font-size:11px;color:var(--ink4)}
.vc-ctrls{display:flex;gap:12px;margin-bottom:20px}
.vc-btn{width:50px;height:50px;border-radius:50%;border:1.5px solid var(--sand2);background:var(--white);color:var(--ink);font-size:18px;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center}
.vc-btn:hover{border-color:var(--accent);color:var(--accent)}
.vc-btn.rec{border-color:var(--red);color:var(--red);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(176,74,58,.2)}50%{box-shadow:0 0 0 10px rgba(176,74,58,0)}}
.sr{width:100%;max-width:560px;background:var(--white);border:1px solid var(--sand2);border-radius:var(--r);padding:20px;box-shadow:var(--shadow)}
.sr h3{font-size:14px;font-weight:600;margin-bottom:12px;text-align:center}
.stars{display:flex;justify-content:center;gap:6px;margin-bottom:14px}
.star{width:34px;height:34px;border-radius:8px;background:var(--sand);border:1px solid var(--sand2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:.2s;color:var(--ink4)}
.star:hover,.star.on{background:var(--yellow-bg);border-color:var(--yellow);color:var(--yellow);transform:scale(1.1)}
.rev-btn{width:100%;padding:10px;border-radius:8px;background:var(--sand);border:1px solid var(--sand2);color:var(--ink3);font-size:13px;cursor:pointer;font-family:inherit;transition:.2s}
.rev-btn:hover{border-color:var(--accent);color:var(--ink)}

const presetQuestions = [
  {id:1,project:'tilta',q:'你简历写Multi-Agent架构，但描述更像单一RAG链路，到底哪里是Multi-Agent？有几个Agent，分别承担什么职责？',keywords:['4个Agent+1编排层','需求澄清/知识检索/文档生成/校验评审','有限状态流转','规则+结构化输出+置信门控','稳定性优先于炫技'],answer:'如果按严格定义，更准确的说法是"强约束、可审计的多角色Agent workflow"。\n\n实际拆了4个Agent + 1个编排层：\n1. 需求澄清Agent - 自然语言需求→结构化输入\n2. 知识检索Agent - RAG检索、召回重排、模板匹配\n3. 文档生成Agent - 基于澄清+检索上下文生成初稿\n4. 校验评审Agent - 字段完整性、逻辑一致性检查\n5. Orchestrator编排层 - 状态机，控制执行顺序和回退\n\n两个关键技术决策：\n① 不做开放式动态规划，只做有限状态流转（IPD容错率低，可追责可审计）\n② 路由不依赖纯LLM意图判断，而是"规则+结构化输出+置信门控"\n\n动态性主要体现在有限分支和回退，不体现在开放式任务分解。这是刻意取舍——稳定性优先于炫技。\n\n方法论：先选可控架构跑通ROI，再决定要不要增加自治度。',level:'red',practiced:0,lastPracticed:null,score:0},
  {id:2,project:'tilta',q:'A档和B档评判标准是谁定的？评审人之间一致性怎么保证？有没有做Kappa系数？',keywords:['产品侧起草rubric','8人试点组','小组双评+分歧复盘','没上正式Kappa','先把评估标准产品化'],answer:'A/B档不是业务方拍脑袋定的，是我产品侧先起草rubric，再和业务owner一起校准。\n\n标准定义：\nA档：可直接进入下一环节，人工只做轻微修订\nB档：框架关键信息基本齐，需补充完善\nC档：关键字段缺失、事实引用错、逻辑冲突\n\n真正参与评审的是8人试点组（需求方、流程owner、交付骨干和我）。\n一致性保证：小组双评+分歧复盘，分歧样本拉业务owner复核，反推rubric改写。\n\n没上正式Kappa系数——样本量和评审池都不大，用交叉评审一致率+分歧样本复盘。\n\n关键决策：先把评估标准产品化，再谈模型优化。A+B从40%提到70%+，前提是"什么叫可用"先被定义清楚了。',level:'red',practiced:0,lastPracticed:null,score:0},
  {id:3,project:'tilta',q:'400人企业一个月IPD新立项可能只有个位数，三轮迭代你实际拿到多少评估样本？40%→70%在统计上站得住吗？',keywords:['64条样本','按场景任务输出数算','试点可用率提升','bad case收敛方向','不包装成统计显著结论'],answer:'三轮迭代累计有效评估样本约64条：第1轮18条，第2轮21条，第3轮25条。\n\n"条"不是只算当月新立项数，而是按可独立验收的任务单元算，来自5个高优场景的输出单元。\n\n第1轮A+B约7/18≈40%，第3轮A+B约18/25≈70%+。\n\n我的表达方式：\n1. 只定义成"试点可用率提升"，不包装成严格统计结论\n2. 更看重bad case收敛方向是否稳定\n\n方法论：在B端低频复杂流程里，先验证"能不能用、哪里失效、能否稳定迭代"，再谈统计强度。\n\n核心价值不是40→70这个数字本身，而是找到了主要失效源——表格型文档chunk结构损失。',level:'red',practiced:0,lastPracticed:null,score:0},
  {id:4,project:'tilta',q:'你怎么定位到"表格型文档chunk结构损失是高频失效源"？bad case具体怎么分类？归因框架是什么？',keywords:['4层归因框架','输入/检索/理解/生成','5类问题','频次最高+修复收益最大','数据表示问题非模型问题'],answer:'系统化归因，按"失败发生在哪一层"去归因：\n\n4层框架：\n1. 输入层：需求本身缺信息、表达歧义\n2. 检索层：没召回/召回错/召回不稳定\n3. 理解层：拿到资料但模型没读懂结构\n4. 生成层：内容组织差、字段遗漏、幻觉补写\n\n每条bad case记录4个字段：失败环节、直接表现、上游触发原因、是否可通过流程/数据修复。\n\n归出5类问题：输入不完整、检索召回偏差、表格/模板结构损失、生成阶段字段漏写/格式漂移、场景边界外任务。\n\n判断"表格结构损失"是主要失效源的两个证据：\n① 频次最高，集中在需求表、立项模板、参数表\n② 修复收益最大——不是"模型不会写"，而是"上游喂进去时结构已经坏了"\n\n方法论：先判断是模型能力问题、数据表示问题、还是流程边界问题。',level:'red',practiced:0,lastPracticed:null,score:0},
  {id:5,project:'tilta',q:'Markdown解析和Key-Value结构化处理方案，是你提的还是研发提的？你的真实贡献边界在哪？',keywords:['方向我提出','问题定义+改造方向+结构化目标+验收闭环','不claim底层parser','把问题重新定义'],answer:'方向是我主导提出并推动落地，具体技术实现不是我写的。\n\n我的四件贡献：\n1. 定义问题：把"生成不准"拆成"结构损失导致的理解错误"\n2. 提出改造方向：要求引入适合表格/模板文档的中间表示\n3. 定义结构化目标：哪些字段保留Key-Value，哪些转Markdown\n4. 做验收闭环：看bad case是否下降，不是只看技术侧说"解析成功率提高了"\n\n研发负责：具体解析方案、格式设计、入库检索链路改造、工程兼容。\n\n不claim自己设计了底层parser。真正的价值是：把问题从"模型效果差"重新定义成"数据表达错位"，推动团队把资源投到更有效的改造点。\n\n一句话：不是我写了解析器，但"该不该做、先做什么、做到什么算有效"是我主导的技术决策。',level:'red',practiced:0,lastPracticed:null,score:0},
  {id:6,project:'tilta',q:'A/B/C档具体看哪几个字段？你怎么用bad case反推RAG和生成链路问题？',keywords:['4类核心维度','完整性/准确性/一致性/可流转性','判定树4步','没拿到→结构坏了→生成错'],answer:'按4类核心维度打分：完整性、准确性、一致性、可流转性。\n\n需求澄清类看：需求背景、目标/预期收益、使用对象、范围边界、关键约束、依赖项、风险点、待确认项。\n立项材料类看：立项背景、业务目标/KPI、方案范围、里程碑、资源投入假设、风险与应对、跨部门依赖、评审所需结论项。\n\n关键字段有任一严重缺失直接C档，不因文笔好给B。\n\nbad case反推用判定树：\n1. 正确信息在不在知识库？不在→输入不完整\n2. 有没有被召回？没有→RAG召回问题\n3. 召回的结构是不是坏了？是→RAG表示问题（chunk打散了字段关系）\n4. 上下文正确可读还写错？→生成链路问题\n\n大量case落在第3类：检索命中看起来不低，但字段关系断裂。',level:'red',practiced:0,lastPracticed:null,score:0},
  {id:7,project:'star',q:'3轮Benchmark里离线精度最优的方案是什么？比MobileNetV3-Small好多少？你放弃了多少精度？',keywords:['四指标综合评估','精度/时延/内存功耗/量产稳定性','小幅领先vs工程代价显著','量产优先','需补benchmark表'],answer:'我主导看的不是单一精度，而是四个指标一起看：识别精度、端侧时延、内存/功耗、在1TOPS约束下的量产稳定性。\n\n离线最优方案精度高于MobileNetV3-Small版，但提升幅度不值得它带来的部署成本。精度是小幅领先，工程代价是显著上升。\n\n我愿意放弃少量离线精度，换确定性的端侧时延、功耗和量产风险收敛。\n\n简历表述收紧为："参与3轮Benchmark评估，主导产品侧选型标准与上线取舍"。\n\n⚠️ 面试前需要补benchmark明细表，记住候选模型名称和关键指标差异。',level:'red',practiced:0,lastPracticed:null,score:0},
  {id:8,project:'star',q:'传感器盲算精度能到什么水平？指向误差多少角分？用户能不能真的找到目标天体？',keywords:['兜底粗导方案','不是主识别方案','任务级综合阈值','依赖FOV和IMU漂移','需补误差数据'],answer:'传感器盲算不是主识别方案，而是兜底粗导方案。\n\n目标不是精确打进视野中心，而是当视觉失效时，基于IMU姿态+时间+地理位置+星历给出可继续操作的粗指向。\n\n产品验收口径：\n- 能否把镜筒从"完全找不到方向"拉回到"接近目标区域"\n- 能否让用户经一步微调后重新进入视觉可识别区\n- 能否和上一级多帧融合形成闭环恢复\n\n盲算能否找到目标取决于设备视场角(FOV)和传感器漂移校准状态。\n\n我主导的是降级策略设计：逐级退化，优先保证"用户还能继续找"。\n\n⚠️ 面试前需补：盲算平均误差/95分位误差、不同FOV下可恢复成功率。',level:'red',practiced:0,lastPracticed:null,score:0},
  {id:9,project:'star',q:'150人调研里，你怎么定义"耐心阈值"？具体阈值是多少？',keywords:['会话级综合阈值','总耗时+连续失败次数','首次成功率比速度重要','新手流失','需补具体数字'],answer:'"耐心阈值"不是单一时间值，而是会话级综合阈值：\n\n1. 从开始导星到首次成功，用户能容忍的总耗时\n2. 连续失败/重试次数——新手真正触发放弃的往往不是多等5秒，而是"试了几次都不对"\n\n产品判断：用户耐心阈值 = 可容忍总时长 + 可容忍失败次数。\n\n为什么落到"首次找星成功率≥90%"而不是"平均导星时间≤X秒"？\n因为第一次能不能成功比快10秒更决定留存。新手前两三次找不到，流失非常快。\n\n⚠️ 面试前必须补两组数：可容忍时长阈值、可容忍失败次数阈值。',level:'red',practiced:0,lastPracticed:null,score:0},
  {id:10,project:'copilot',q:'LLM推荐的面额组合和策略引擎推荐的结果重合度有多高？LLM增量价值在哪？不一致时以谁为准？',keywords:['高重合是正常的','预案生成器非裁决器','三个增量价值','策略引擎负责下限','协同工作流'],answer:'两者应该有较高重合，不一致时以策略引擎为准。\n\nCopilot定位是辅助决策层，不是替代策略引擎。\n\n重合度高不是坏事，说明LLM没乱来。LLM更像预案生成器，不是最终裁决器。\n\nLLM三个增量价值：\n1. 快速整理人群特征+预算约束成可讨论的面额预案\n2. 给出预期ROI区间和解释，缩短人工分析时间\n3. 帮PM更快形成候选方案，迭代周期周级→天级\n\n不一致时：先看LLM是否读到了引擎没编码的新上下文→PM审核→最终以策略引擎验证为准。\n\n核心价值不是比策略引擎更准，而是把"分析→出预案→验证"链路显著缩短。',level:'red',practiced:0,lastPracticed:null,score:0},
  {id:11,project:'copilot',q:'ROI从1.5到1.8，你怎么确认是Copilot的功劳而不是策略引擎自然提升？有没有做对照？',keywords:['不全归因Copilot','效率提升60%是硬归因','迭代密度提高','没有完美长期RCT','间接+直接分清'],answer:'不会把1.5→1.8全部归因给Copilot。\n\n直接归因Copilot的：\n- 数据分析效率提升60%\n- 策略迭代周期从周级到天级\n\nROI提升表述：原策略引擎+Copilot辅助迭代共同作用结果。Copilot贡献在于更快发现异动、更快产出候选预案、更快进入验证。\n\n没有做"完全不用Copilot只靠原流程"的严格长期RCT——经营系统很难长期完全隔离工具使用。\n\n证据链：\n- 原流程瓶颈在人工复盘慢、调优链路长\n- Copilot直接压短了这段链路\n- 双11经Copilot辅助迭代的策略拉动增量GMV超目标20%\n\n1.5→1.8更准确表达：Copilot通过缩短分析→决策→验证链路，提高策略迭代密度，在原引擎基础上带来额外经营收益。',level:'red',practiced:0,lastPracticed:null,score:0},
  {id:12,project:'aigc',q:'分享回流参团率提升18%，你怎么确认是文案的功劳而不是UI/UX重构的功劳？',keywords:['不全归因AIGC','拆层验证','文案独立子实验','中个位数lift','组合策略结果'],answer:'18%是整体项目结果，AIGC是核心因子之一但不是唯一因子。\n\n拆层验证：\n第一层：保持UI不变，只替换分享话术/素材，对比回流点击率、回流参团率\n第二层：验证链路UI/UX改造的额外增益\n\n文案侧独立子实验有正向lift，但量级低于整体18%，按"中个位数相对提升"讲。\n\nAIGC独立价值主要在：\n1. 内容侧子实验能看到正向lift\n2. 素材生产效率提升80%+，支撑大促大规模覆盖\n\n18%是内容、分发、UI、交易底座一起作用的结果。AIGC不是独占18%的归因主体，它是整体增长方案中的内容引擎。',level:'red',practiced:0,lastPracticed:null,score:0},
  {id:13,project:'aigc',q:'AIGC文案本身对转化只有中个位数lift，那核心价值是"生产提效80%"。提效80%具体意味什么？绝对量级？',keywords:['20-30分钟/条→4-6分钟/条','5万条版本池','净省1.7万小时','长尾商品覆盖','供给扩容'],answer:'单条素材完整链路（理解场景+写首稿+改一轮+入库）：\n- 人工原来20~30分钟/条\n- AIGC后运营做抽检轻改，降到4~6分钟/条\n\n绝对量级（保守口径）：\n一次大促准备5万条可用素材版本\n- 人工25分钟/条 = 125万分钟 ≈ 2.1万小时\n- AIGC后5分钟/条 = 25万分钟 ≈ 4167小时\n- 净节省约1.7万小时 ≈ 2100个8小时人天\n\n真实价值不是省一个运营组加班，而是把原本根本做不出来的供给规模做出来——覆盖长尾商品和长尾场景。\n\nAIGC第一价值是生产提效和供给扩容，第二价值才是文案单点转化lift。',level:'red',practiced:0,lastPracticed:null,score:0},
  {id:14,project:'roi',q:'四维用户分层模型的四个维度怎么来的？是你基于业务判断定的还是算法跑特征重要性排出来的？',keywords:['业务机理先定框架','价格敏感度/消费活跃度/品类偏好/生命周期','排除静态画像/渠道/短周期行为/风险','三者平衡'],answer:'不是算法直接"算出来"的，是我先从补贴业务机理提出分层框架，再和算法验证。\n\n核心判断：补贴要看ROI，本质回答四件事——这个人会不会买、对价格敏不敏感、买什么、处在什么阶段。\n\n四个维度：\n- 价格敏感度：给券有没有弹性\n- 消费活跃度：补贴是拉活还是补贴本来就会买的人\n- 品类偏好：券发到哪个品类更容易转化\n- 生命周期阶段：策略目标是拉新/促活/召回/提频\n\n排除的候选维度：\n1. 静态画像（年龄/性别/城市）——直接可操作性弱\n2. 渠道/设备类——迁移性差、波动大\n3. 短周期行为——放在策略触发层，不做一级分层\n4. 风险/售后类——和"发多少券最优"不是一回事\n\n收敛标准：业务解释性×算法可验证性×运营可执行性三者平衡最好的组合。',level:'red',practiced:0,lastPracticed:null,score:0},
  {id:15,project:'roi',q:'拼多多用户整体就是价格敏感群体，再做敏感度分层区分度够吗？具体怎么量化？',keywords:['边际响应而非绝对标签','3类信号','优惠响应/价格选择/原价承受','相对弹性','综合敏感度分'],answer:'价格敏感度不是看"是不是便宜货用户"，而是看"对价格变化的边际响应有多强"。\n\n做的是相对分层：在同一平台用户池里，把"对优惠刺激高度响应"和"即使不给券也会买"的人分开。\n\n3类量化信号：\n1. 优惠响应：领券后下单占比、券核销率、大促成交占比、有券vs无券转化差异\n2. 价格选择：同品类低价SKU选择率、历史成交价格带、是否持续下探低价档\n3. 原价承受：无补贴原价成交占比、非活动期购买稳定性、补贴撤掉后留存\n\n高敏感=对价格刺激有弹性，撤掉优惠后转化掉得快\n低敏感=即使不给券也会买，补贴更多是侵蚀ROI\n\n不用单一指标如"领券率"代表，那会把"会薅券但不下单"的人混进来。\n\n关键发现：大家都敏感，但敏感弹性不同，ROI就来自这种弹性差。',level:'red',practiced:0,lastPracticed:null,score:0},
  {id:16,project:'roi',q:'核销率只提了1个百分点(12%→13%)，但ROI提了25%(1.2→1.5)，这个变动幅度差很大。ROI提升到底靠什么驱动？',keywords:['面额优化减少过补贴','人群更准提高增量占比','单位核销产出变高','结构性重分配非砍预算','核销率是数量ROI是质量'],answer:'ROI主因绝对不是核销率那1个点本身。核心是"少错发、少过补、每次核销更值钱"三件叠加。\n\n归因排序：\n1. 面额更匹配，减少过补贴 — 分层后找到各圈层最优面额\n2. 人群更准，减少对"本来就会买"用户的补贴 — 核销里增量订单占比更高\n3. 单次核销产出更高 — 增量GMV、毛利、复购价值\n4. 核销率提升本身是结果之一，不是最大主因\n\n不是简单缩预算——是结构性重分配：把券从低弹性人群挪到高弹性人群，把大面额挪成更优组合。\n\n12%→13%只说明"券更容易被用"，1.2→1.5说明更核心地解决了"券该不该发、发给谁、发多大"。\n\n核销率是数量指标，ROI是质量指标。',level:'red',practiced:0,lastPracticed:null,score:0},
  {id:17,project:'tilta',q:'哪个项目最能代表你作为AI产品经理的核心能力？你的可迁移能力和gap分别是什么？',keywords:['Copilot项目','判断AI放哪一层','闭环不只看模型','受约束的AI','gap在底层模型和平台'],answer:'最能代表的是拼多多"LLM驱动的发券运营Copilot"。\n\n体现三件事：\n1. 先判断AI应该放在哪一层——LLM初筛→PM审核→策略引擎验证\n2. 更看重闭环——效率提升60%、周级→天级\n3. 习惯做"受约束的AI产品"——先定义边界、评估标准和人工兜底\n\n可直接迁移的能力：\n- 场景抽象：把复杂业务问题拆成"哪些适合AI"\n- AI方案设计：RAG/人审闭环/模型辅助 的判断力\n- 评估与落地：bad case、质量分层、A/B、ROI串起来\n\n明显的gap：\n- 底层模型和算法深度不够——能做产品侧选型，不是基础模型训练owner\n- 超大规模通用AI平台经验不够——做的更多是业务AI应用层\n\n强项是把AI从"能做"推进到"能上线、能稳定、能拿结果"；gap在更底层的模型与平台深水区。',level:'red',practiced:0,lastPracticed:null,score:0},

function normalizeLLMConfig(cfg){
  return {
    baseUrl:typeof cfg?.baseUrl==='string'?cfg.baseUrl:'',
    apiKey:typeof cfg?.apiKey==='string'?cfg.apiKey:'',

function normalizeAIDraft(draft){
  const items=Array.isArray(draft?.items)?draft.items.map((item,idx)=>({
    id:item.id || `ai_${Date.now()}_${idx}_${Math.random().toString(36).slice(2,7)}`,
    projectId:item.projectId || 'default',
    projectName:item.projectName || '',
    question:item.question || '',
    answer:item.answer || '',
    keywords:Array.isArray(item.keywords)?item.keywords.filter(Boolean):[],
    source:item.source || 'mixed',
    confidence:Number.isFinite(item.confidence)?item.confidence:null
  })).filter(item=>item.question && item.answer):[];
  return {
    summary:typeof draft?.summary==='string'?draft.summary:'',
    items,
    updatedAt:draft?.updatedAt || null,
    sourceLabel:typeof draft?.sourceLabel==='string'?draft.sourceLabel:''
  };
}

function normalizeInterviewLab(lab){
  const base=createDefaultInterviewLab();
  const prompts=lab&&typeof lab.prompts==='object'?lab.prompts:{};
  return {
    mode:['single','dual','mixed'].includes(lab?.mode)?lab.mode:base.mode,
    projectId:typeof lab?.projectId==='string'?lab.projectId:base.projectId,
    maxQuestions:10,
    prompts:{
      interviewer:typeof prompts.interviewer==='string'&&prompts.interviewer.trim()?prompts.interviewer:base.prompts.interviewer,
      candidate:typeof prompts.candidate==='string'&&prompts.candidate.trim()?prompts.candidate:base.prompts.candidate,
      formatter:typeof prompts.formatter==='string'&&prompts.formatter.trim()?prompts.formatter:base.prompts.formatter
    },
    turns:Array.isArray(lab?.turns)?lab.turns.map((turn,idx)=>({
      id:turn.id || `turn_${idx}_${Math.random().toString(36).slice(2,7)}`,
      question:typeof turn.question==='string'?turn.question:'',
      answer:typeof turn.answer==='string'?turn.answer:'',
      questionSource:typeof turn.questionSource==='string'?turn.questionSource:'interviewer',
      answerSource:typeof turn.answerSource==='string'?turn.answerSource:'candidate',
      projectId:typeof turn.projectId==='string'?turn.projectId:'default',
      keywords:Array.isArray(turn.keywords)?turn.keywords.map(x=>String(x)).filter(Boolean).slice(0,6):[],
      createdAt:turn.createdAt || new Date().toISOString()
    })).filter(turn=>turn.question):[],
    askedCount:Number.isFinite(lab?.askedCount)?Math.min(10,Math.max(0,lab.askedCount)):0,
    status:['idle','running','await_user_answer','paused','complete'].includes(lab?.status)?lab.status:base.status,
    paused:!!lab?.paused,
    complete:!!lab?.complete,
    currentQuestion:typeof lab?.currentQuestion==='string'?lab.currentQuestion:'',
    currentQuestionKeywords:Array.isArray(lab?.currentQuestionKeywords)?lab.currentQuestionKeywords.map(x=>String(x)).filter(Boolean).slice(0,6):[],
    currentUserAnswer:typeof lab?.currentUserAnswer==='string'?lab.currentUserAnswer:'',
    contextText:typeof lab?.contextText==='string'?lab.contextText:'',
    notesText:typeof lab?.notesText==='string'?lab.notesText:'',
    cachedSourceText:typeof lab?.cachedSourceText==='string'?lab.cachedSourceText:'',
    cachedUnreadable:Array.isArray(lab?.cachedUnreadable)?lab.cachedUnreadable.map(x=>String(x)).filter(Boolean):[],
    lastPreviewAt:lab?.lastPreviewAt || null,
    markdown:typeof lab?.markdown==='string'?lab.markdown:'',
    lastSavedFilename:typeof lab?.lastSavedFilename==='string'?lab.lastSavedFilename:'',
    sourceFiles:Array.isArray(lab?.sourceFiles)?lab.sourceFiles.map(x=>String(x)).filter(Boolean):[],
    notice:typeof lab?.notice==='string'?lab.notice:''
  };
}

function clamp(n,min,max){return Math.min(max,Math.max(min,n))}
function addMsISO(base,ms){return new Date(base+ms).toISOString()}
function addDaysISO(base,days){const d=new Date(base);d.setDate(d.getDate()+days);return d.toISOString()}
function ladderNext(prev,steps){for(const step of steps){if(step>prev)return step}return steps[steps.length-1]}

function inferSchedule(q){
  const now=Date.now();
  const practiced=Number.isFinite(q.practiced)?q.practiced:0;
  const lastTs=q.lastPracticed?new Date(q.lastPracticed).getTime():now;
  const level=['red','yellow','green'].includes(q.level)?q.level:'red';
  const intervalDays=Number.isFinite(q.intervalDays)?q.intervalDays:(practiced===0?0:(level==='green'?3:level==='yellow'?1:0));
  const streak=Number.isFinite(q.streak)?q.streak:(level==='green'?Math.min(practiced||1,3):level==='yellow'?(practiced?1:0):0);
  const lapseCount=Number.isFinite(q.lapseCount)?q.lapseCount:0;
  const lastResult=typeof q.lastResult==='string'?q.lastResult:null;
  let nextReviewAt=q.nextReviewAt || null;
  if(!nextReviewAt){
    if(practiced===0 || level==='red')nextReviewAt=new Date(now).toISOString();
    else nextReviewAt=addDaysISO(lastTs,intervalDays);
  }
  return {intervalDays,streak,lapseCount,lastResult,nextReviewAt};
}

function normalizeQuestion(q){
  const schedule=inferSchedule(q);
  return {
    id:q.id ?? Date.now()+Math.random(),
    project:q.project || 'default',
    q:q.q || '',
    answer:q.answer || '（暂未填写答案）',
    keywords:Array.isArray(q.keywords)?q.keywords.filter(Boolean):[],
    level:['red','yellow','green'].includes(q.level)?q.level:'red',
    practiced:Number.isFinite(q.practiced)?q.practiced:0,
    lastPracticed:q.lastPracticed || null,
    score:Number.isFinite(q.score)?q.score:0,
    intervalDays:schedule.intervalDays,
    streak:schedule.streak,
    lapseCount:schedule.lapseCount,
    lastResult:schedule.lastResult,
    nextReviewAt:schedule.nextReviewAt,
  };
}

function migrateState(raw){
  const base=createDefaultState();
  if(!raw||!raw.projects||!raw.questions)return base;
  return {
    version:SCHEMA_VERSION,
    projects:Array.isArray(raw.projects)&&raw.projects.length?raw.projects:base.projects,
    questions:Array.isArray(raw.questions)?raw.questions.map(normalizeQuestion):base.questions,
    filter:['all','red','yellow','green'].includes(raw.filter)?raw.filter:'all',
    projFilter:raw.projFilter || 'all',
    flashProjFilter:raw.flashProjFilter || 'all',
    log:Array.isArray(raw.log)?raw.log:[],
    llmConfig:normalizeLLMConfig(raw.llmConfig),
    llmConfigSecondary:normalizeLLMConfig(raw.llmConfigSecondary),
    aiDraft:normalizeAIDraft(raw.aiDraft),
    interviewLab:normalizeInterviewLab(raw.interviewLab)
  };
}

function load(){
  try{
    const s=localStorage.getItem(SK);
    if(s)return migrateState(JSON.parse(s));
  }catch(e){}
  return createDefaultState();
}
function save(){try{state.version=SCHEMA_VERSION;localStorage.setItem(SK,JSON.stringify(state))}catch(e){}}

function isDue(q,now=Date.now()){
  return !q.nextReviewAt || new Date(q.nextReviewAt).getTime()<=now;
}

function sortByReviewPriority(list){
  return [...list].sort((a,b)=>{
    const aTs=a.nextReviewAt?new Date(a.nextReviewAt).getTime():0;
    const bTs=b.nextReviewAt?new Date(b.nextReviewAt).getTime():0;
    const aDue=isDue(a),bDue=isDue(b);
    if(aDue!==bDue)return aDue?-1:1;
    if(aTs!==bTs)return aTs-bTs;
    const lv={red:0,yellow:1,green:2};
    return (lv[a.level]??9)-(lv[b.level]??9);
  });
}

function describeNextReview(q,now=Date.now()){
  if(isDue(q,now))return '现在复习';
  const ts=new Date(q.nextReviewAt).getTime();
  const diff=ts-now;
  const mins=Math.round(diff/6e4);
  if(mins<60)return `${Math.max(10,mins)}分钟后`;
  const hours=Math.round(diff/36e5);
  if(hours<24)return `${Math.max(1,hours)}小时后`;
  const days=Math.round(diff/864e5);
  return `${Math.max(1,days)}天后`;
}

function scheduleQuestion(q,result,meta={}){
  const now=Date.now();
  const prevInterval=Number.isFinite(q.intervalDays)?q.intervalDays:0;
  let intervalDays=prevInterval;
  let nextReviewAt=q.nextReviewAt || new Date(now).toISOString();
  let streak=Number.isFinite(q.streak)?q.streak:0;
  let lapseCount=Number.isFinite(q.lapseCount)?q.lapseCount:0;

  if(result==='red'){
    intervalDays=0;
    streak=0;
    lapseCount+=1;
    nextReviewAt=addMsISO(now,20*60*1000);
  }else if(result==='yellow'){
    streak=clamp(streak+1,1,99);
    intervalDays=ladderNext(prevInterval,[1,2,4,7,10,14]);
    nextReviewAt=addDaysISO(now,intervalDays);
  }else{
    streak=clamp(streak+1,1,99);
    intervalDays=ladderNext(prevInterval,[3,7,14,21,30]);
    nextReviewAt=addDaysISO(now,intervalDays);
  }

  q.level=result;
  q.practiced=(q.practiced||0)+1;
  q.lastPracticed=new Date(now).toISOString();
  q.lastResult=result;
  q.intervalDays=intervalDays;
  q.streak=streak;
  q.lapseCount=lapseCount;
  q.nextReviewAt=nextReviewAt;

  state.log.push({
    id:q.id,
    result,
    source:meta.source || 'review',
    score:meta.score ?? null,
    sec:meta.sec ?? null,
    t:now,
    nextReviewAt,
    intervalDays
  });
}

function setManualSchedule(q,result){
  const now=Date.now();
  q.level=result;
  q.lastResult=result;
  if(result==='red'){
    q.intervalDays=0;
    q.streak=0;
    q.nextReviewAt=new Date(now).toISOString();
  }else if(result==='yellow'){
    q.intervalDays=Math.max(1,q.intervalDays||1);
    q.streak=Math.max(1,q.streak||1);
    q.nextReviewAt=addDaysISO(now,q.intervalDays);
  }else{
    q.intervalDays=Math.max(3,q.intervalDays||3);
    q.streak=Math.max(1,q.streak||1);
    q.nextReviewAt=addDaysISO(now,q.intervalDays);
  }
}

function importJSON(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(data.projects&&data.questions){
        state=migrateState(data);save();location.reload();
      }else{alert('文件格式不正确')}
    }catch(err){alert('解析失败：'+err.message)}
  };
  reader.readAsText(file);
  e.target.value='';
}

function importBundledDataset(key){
  const bundle=window.BUNDLED_IMPORTS&&window.BUNDLED_IMPORTS[key];
  if(!bundle){alert('没有找到可导入的映射数据');return}
  const result=mergeBundledDataset(bundle);
  save();
  updateHd();
  fillProjSelects();
  renderProjList();
  alert(`已导入《${bundle.name||key}》映射稿：新增 ${result.added} 题，跳过 ${result.skipped} 条重复题目，新增 ${result.newProjects} 个分组。`);
}

function mergeBundledDataset(bundle){
  let added=0,skipped=0,newProjects=0;
  (bundle.projects||[]).forEach(project=>{
    if(!state.projects.some(p=>p.id===project.id)){
      state.projects.push({id:project.id,name:project.name});
      newProjects++;
    }
  });
  (bundle.questions||[]).forEach(item=>{
    const exists=state.questions.some(q=>q.project===item.project && q.q.trim()===item.q.trim());
    if(exists){skipped++;return}
    state.questions.push(normalizeQuestion({
      id:Date.now()+Math.random(),
      project:item.project,
      q:item.q,
      answer:item.answer,
      keywords:item.keywords||[],
      level:'red',
      practiced:0,
      lastPracticed:null,
      score:0
    }));
    added++;
  });
  return {added,skipped,newProjects};
}

function autoImportBundledDatasetOnce(key,flag){
  try{
    if(localStorage.getItem(flag))return;
    const bundle=window.BUNDLED_IMPORTS&&window.BUNDLED_IMPORTS[key];
    if(!bundle)return;
    mergeBundledDataset(bundle);
    save();
    localStorage.setItem(flag,'1');
  }catch(e){}
}

function normalizeLocalImportText(text){
  return String(text||'')
    .toLowerCase()
    .replace(/[`~*_>#\[\]\(\)\|]/g,' ')
    .replace(/[—–]/g,'-')
    .replace(/\s+/g,' ')
    .trim();
}

function stripLocalMarkdownDecorators(line){
  return String(line||'')
    .replace(/^\s*#{1,6}\s*/,'')
    .replace(/^\s*[-*+]\s+/,'')
    .replace(/^\s*>\s?/,'')
    .replace(/\*\*([^*]+)\*\*/g,'$1')
    .replace(/__([^_]+)__/g,'$1')
    .replace(/`([^`]+)`/g,'$1')
    .trim();
}

function isLocalQuestionCandidate(line){
  const plain=stripLocalMarkdownDecorators(line);
  if(!plain)return false;
  if(/^(q\d+(?:[-—–][^：:]+)?|问题|追问|面试问题)\s*[：:]/i.test(plain))return true;
  if(/^q\d+\b/i.test(plain))return true;
  return /[？?]$/.test(plain) && plain.length<=120;
}

function cleanLocalQuestionText(line){
  let plain=stripLocalMarkdownDecorators(line);
  plain=plain
    .replace(/^(q\d+(?:[-—–][^：:]+)?)\s*[：:]\s*/i,'')
    .replace(/^(q\d+)\s+/i,'')
    .replace(/^(问题|追问|面试问题)\s*[：:]\s*/,'')
    .trim();
  return plain;
}

function cleanLocalAnswerLine(line){
  return String(line||'')
    .replace(/^\s*>\s?/,'')
    .replace(/^\s*[-*+]\s+/,'')
    .replace(/^\s*\*\*?(回答|答|a)\s*[：:]\s*\*\*?\s*/i,'')
    .replace(/^\s*(回答|答|a)\s*[：:]\s*/i,'')
    .trimEnd();
}

function extractLocalDocTitle(text,sourceName=''){
  const lines=String(text||'').replace(/\r\n?/g,'\n').split('\n');
  const heading=lines.find(line=>/^\s*#{1,6}\s+/.test(line));
  const title=heading?stripLocalMarkdownDecorators(heading):'';
  return title || sourceName || '本地文本';
}

function fallbackParseLocalBlocks(text){
  return String(text||'')
    .split(/\n\s*\n+/)
    .map(block=>block.trim())
    .filter(Boolean)
    .map(block=>{
      const lines=block.split('\n').map(line=>line.trim()).filter(Boolean);
      if(lines.length<2)return null;
      const q=cleanLocalQuestionText(lines[0]);
      const answer=lines.slice(1).map(cleanLocalAnswerLine).join('\n').trim();
      if(!q || !answer)return null;
      return {q,answer};
    })
    .filter(Boolean);
}

function parseLocalSmartBlocks(text){
  const lines=String(text||'').replace(/\r\n?/g,'\n').split('\n');
  const blocks=[];
  let current=null;
  const pushCurrent=()=>{
    if(!current||!current.q)return;
    const answer=current.answerLines.join('\n').replace(/\n{3,}/g,'\n\n').trim();
    if(answer)blocks.push({q:current.q,answer});
    current=null;
  };

  lines.forEach(line=>{
    const trimmed=line.trim();
    if(/^---+$/.test(trimmed))return;
    const headingMatch=line.match(/^\s*#{1,6}\s+(.+?)\s*$/);
    const probe=headingMatch?headingMatch[1]:line;

    if(isLocalQuestionCandidate(probe)){
      pushCurrent();
      current={q:cleanLocalQuestionText(probe),answerLines:[]};
      return;
    }

    if(!current)return;

    if(!trimmed){
      if(current.answerLines.length && current.answerLines[current.answerLines.length-1] !== '')current.answerLines.push('');
      return;
    }

    if(/^\s*\*\*?(回答|答|a)\s*[：:]\s*\*\*?\s*$/i.test(trimmed) || /^\s*(回答|答|a)\s*[：:]\s*$/i.test(trimmed)){
      return;
    }

    current.answerLines.push(cleanLocalAnswerLine(line));
  });

  pushCurrent();
  return blocks.length?blocks:fallbackParseLocalBlocks(text);
}

function getLocalProjectTerms(project){
  const nameParts=String(project.name||'')
    .split(/[·•/]/)
    .map(part=>part.trim())
    .filter(Boolean);
  return [...new Set([project.id,project.name,...nameParts,...(LOCAL_PROJECT_ALIAS_MAP[project.id]||[])])];
}

function inferLocalProjectId(text,fallbackId='default'){
  const hay=normalizeLocalImportText(text);
  let bestId=fallbackId;
  let bestScore=0;

  state.projects.forEach(project=>{
    if(project.id==='default')return;
    let score=0;
    getLocalProjectTerms(project).forEach(term=>{
      const normalized=normalizeLocalImportText(term);
      if(!normalized)return;
      if(hay.includes(normalized)){
        score += normalized.length>=8?8:normalized.length>=5?6:4;
      }
    });
    if(score>bestScore){
      bestScore=score;
      bestId=project.id;
    }
  });

  return bestScore>0?bestId:fallbackId;
}

function buildLocalKeywords(projectId,titleText=''){
  const project=state.projects.find(p=>p.id===projectId);
  const fromProject=project?String(project.name).split(/[·•/]/).map(part=>part.trim()).filter(Boolean):[];
  const fromTitle=stripLocalMarkdownDecorators(titleText).split(/[·•/]/).map(part=>part.trim()).filter(Boolean);
  return [...new Set([...fromProject,...fromTitle])]
    .filter(term=>term && term!=='默认分组' && term.length<=14)
    .slice(0,5);
}

function buildLocalBundleFromText(text,sourceName,fallbackId='default'){
  const title=extractLocalDocTitle(text,sourceName);
  const blocks=parseLocalSmartBlocks(text);
  const docProjectId=inferLocalProjectId(`${sourceName}\n${title}\n${text.slice(0,4000)}`,fallbackId);
  const questions=blocks.map((block,idx)=>{
    const projectId=inferLocalProjectId(`${sourceName}\n${title}\n${block.q}\n${block.answer}`,docProjectId);
    return {
      id:`local_${Date.now()}_${idx}_${Math.random().toString(36).slice(2,7)}`,
      project:projectId,
      q:escapeHtml(block.q),
      answer:escapeHtml(block.answer),
      keywords:buildLocalKeywords(projectId,title)
    };
  });
  return {title,questions};
}

  const fileInput=document.getElementById('localMapFilesInput');
  const textEl=document.getElementById('localMapText');
  const files=fileInput&&fileInput.files?Array.from(fileInput.files):[];
  const pastedText=textEl?textEl.value.trim():'';
  if(!files.length && !pastedText){
    throw new Error('请先上传文本文件，或粘贴一段 Markdown / 文本内容');
  }
  const sources=[];
  for(const file of files){
    const text=await readFileAsText(file);
    if(text.trim())sources.push({name:file.name,text});
  }
  if(pastedText)sources.push({name:'粘贴文本',text:pastedText});
  return sources;
}

function analyzeLocalMapSources(sources,fallbackId,mode='preview'){
  let parsed=0,added=0,skipped=0;
  const perProject=new Map();
  const sourceReports=[];
  const items=[];

  sources.forEach(source=>{
    const bundle=buildLocalBundleFromText(source.text,source.name,fallbackId);
    let sourceAdded=0,sourceSkipped=0;
    parsed+=bundle.questions.length;
    bundle.questions.forEach(item=>{
      perProject.set(item.project,(perProject.get(item.project)||0)+1);
      const exists=state.questions.some(q=>q.project===item.project && q.q.trim()===item.q.trim());
      if(exists){skipped++;sourceSkipped++;}
      else {added++;sourceAdded++;}
      items.push(item);
    });
    sourceReports.push({
      name:source.name,
      recognized:bundle.questions.length,
      added:sourceAdded,
      skipped:sourceSkipped
    });
  });

  return {
    mode,
    totalRecognized:parsed,
    totalAdded:added,
    totalSkipped:skipped,
    projects:[...perProject.entries()].map(([projectId,count])=>({projectId,count})).sort((a,b)=>b.count-a.count),
    sources:sourceReports,
    items
  };
}

function getChatCompletionsEndpoint(baseUrl){
  const clean=(baseUrl||'').trim().replace(/\/+$/,'');
  if(!clean)return '';
  if(/\/chat\/completions$/i.test(clean))return clean;
  if(/\/v1$/i.test(clean))return `${clean}/chat/completions`;
  return `${clean}/v1/chat/completions`;
}

function readFileAsText(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(typeof reader.result==='string'?reader.result:'');
    reader.onerror=()=>reject(new Error(`读取文件失败：${file.name}`));
    reader.readAsText(file);
  });
}

function readFileAsArrayBuffer(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result);
    reader.onerror=()=>reject(new Error(`读取文件失败：${file.name}`));
    reader.readAsArrayBuffer(file);
  });
}

const externalScriptCache={};

function loadExternalScript(src,tester){
  if(tester&&tester())return Promise.resolve();
  if(externalScriptCache[src])return externalScriptCache[src];
  externalScriptCache[src]=new Promise((resolve,reject)=>{
    const existing=[...document.scripts].find(script=>script.src===src);
    if(existing){
      existing.addEventListener('load',()=>resolve(),{once:true});
      existing.addEventListener('error',()=>reject(new Error(`加载解析组件失败：${src}`)),{once:true});
      return;
    }
    const script=document.createElement('script');
    script.src=src;
    script.async=true;
    script.onload=()=>resolve();
    script.onerror=()=>reject(new Error(`加载解析组件失败：${src}`));
    document.head.appendChild(script);
  }).then(()=>{
    if(tester&&!tester())throw new Error(`解析组件加载成功，但未能初始化：${src}`);
  });
  return externalScriptCache[src];
}

async function ensurePdfJsLoaded(){
  await loadExternalScript('https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.js',()=>!!window.pdfjsLib);
  if(window.pdfjsLib&&window.pdfjsLib.GlobalWorkerOptions){
    window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.worker.min.js';
  }
}

async function ensureMammothLoaded(){
  await loadExternalScript('https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js',()=>!!window.mammoth);
}

async function readPdfAsText(file){
  await ensurePdfJsLoaded();
  const buffer=await readFileAsArrayBuffer(file);
  const pdf=await window.pdfjsLib.getDocument({data:new Uint8Array(buffer)}).promise;
  const pages=[];
  for(let i=1;i<=pdf.numPages;i++){
    const page=await pdf.getPage(i);
    const content=await page.getTextContent();
    const pageText=content.items.map(item=>item&&item.str?item.str:'').join(' ').replace(/\s+/g,' ').trim();
    if(pageText)pages.push(`第 ${i} 页\n${pageText}`);
  }
  return pages.join('\n\n');
}

async function readDocxAsText(file){
  await ensureMammothLoaded();
  const buffer=await readFileAsArrayBuffer(file);
  const result=await window.mammoth.extractRawText({arrayBuffer:buffer});
  return (result&&result.value?result.value:'').replace(/\n{3,}/g,'\n\n').trim();
}

async function readSupportedDocumentText(file){
  const name=(file&&file.name?file.name:'').toLowerCase();
  if(name.endsWith('.pdf'))return readPdfAsText(file);
  if(name.endsWith('.docx'))return readDocxAsText(file);
  if(name.endsWith('.doc'))throw new Error(`暂不支持直接解析旧版 Word（.doc）：${file.name}，建议先另存为 .docx 后再导入`);
  return readFileAsText(file);
}

async function collectAISourceText(files,dialogue,notes){
  const sections=[];
  const unreadable=[];
  const parseErrors=[];
  let totalChars=0;
  const pushSection=(title,content)=>{
    if(!content)return;
    const maxPerSection=22000;
    const trimmed=content.trim();
    if(!trimmed)return;
    const sliced=trimmed.slice(0,maxPerSection);
    totalChars+=sliced.length;
    sections.push(`### ${title}\n${sliced}`);
  };
  for(const file of files){
    try{
      const text=await readSupportedDocumentText(file);
      pushSection(`文档：${file.name}`,text);
    }catch(err){
      unreadable.push(file.name);
      parseErrors.push(err&&err.message?err.message:`解析失败：${file.name}`);
    }
  }
  pushSection('面试对话',dialogue||'');
  pushSection('补充说明',notes||'');
  return {
    text:sections.join('\n\n').slice(0,120000),
    unreadable,
    parseErrors
  };
}

function getProjectsPromptText(){
  return state.projects.map(p=>`- ${p.id}: ${p.name}`).join('\n');
}

function extractAssistantText(data){
  const msg=data&&data.choices&&data.choices[0]&&data.choices[0].message?data.choices[0].message:null;
  if(!msg)return '';
  if(typeof msg.content==='string')return msg.content;
  if(Array.isArray(msg.content)){
    return msg.content.map(part=>typeof part==='string'?part:(part&&part.text?part.text:'')).join('\n');
  }
  return '';
}

function extractJsonPayload(text){
  const raw=(text||'').trim();
  if(!raw)throw new Error('模型没有返回内容');
  const fence=raw.match(/```(?:json)?\s*([\s\S]*?)```/i);
  const candidate=fence?fence[1].trim():raw;
  try{return JSON.parse(candidate)}catch(e){}
  const start=candidate.indexOf('{');
  const end=candidate.lastIndexOf('}');
  if(start!==-1&&end!==-1&&end>start){
    return JSON.parse(candidate.slice(start,end+1));
  }
  throw new Error('模型返回的不是可解析的 JSON');
}

function resolveProjectId(projectId,projectName){
  if(projectId && state.projects.some(p=>p.id===projectId))return projectId;
  if(projectName){
    const lowered=projectName.trim().toLowerCase();
    const exact=state.projects.find(p=>p.name.toLowerCase()===lowered);
    if(exact)return exact.id;
    const fuzzy=state.projects.find(p=>p.name.toLowerCase().includes(lowered)||lowered.includes(p.name.toLowerCase()));
    if(fuzzy)return fuzzy.id;
  }
  return 'default';
}

function normalizeAIItem(item,idx){
  const projectId=resolveProjectId(item.projectId,item.projectName);
  const project=state.projects.find(p=>p.id===projectId);
  return {
    id:`ai_${Date.now()}_${idx}_${Math.random().toString(36).slice(2,7)}`,
    projectId,
    projectName:project?project.name:(item.projectName||'默认分组'),
    question:(item.question||'').trim(),
    answer:(item.answer||'').trim(),
    keywords:Array.isArray(item.keywords)?item.keywords.map(x=>String(x).trim()).filter(Boolean).slice(0,6):[],
    source:(item.source||'mixed').trim(),
    confidence:Number.isFinite(item.confidence)?Number(item.confidence):null
  };
}

async function callLLM(messages){
  const cfg=syncLLMConfigFromForm();
  if(!cfg.baseUrl||!cfg.apiKey||!cfg.model)throw new Error('请先填写 Base URL、API Key 和 Model');
  const endpoint=getChatCompletionsEndpoint(cfg.baseUrl);
  const resp=await fetch(endpoint,{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization':`Bearer ${cfg.apiKey}`
    },
    body:JSON.stringify({
      model:cfg.model,
      temperature:0.2,
      messages
    })
  });
  if(!resp.ok){
    const text=await resp.text();
    throw new Error(`模型调用失败（${resp.status}）：${text.slice(0,300)}`);
  }
  const data=await resp.json();
  return extractAssistantText(data);
}

const AI_INTERVIEW_FORMATTER_SYSTEM_PROMPT=`你是一个面试准备助手，要把模拟面试对话整理成结构化问答，并严格映射到已有项目。

要求：
1. 只输出 JSON，不要输出解释、Markdown、代码块围栏。
2. 每一条 items 都必须映射到一个已有项目的 projectId；如果无法确定，使用 "default"。
3. 输出适合面试练习的高价值问答，问题要像面试官会问的话，答案要保留关键数据点与推理链。
4. 去掉明显重复、太泛、太空的话术。
5. keywords 保持 3 到 6 个短词。
6. source 输出 "single-model"、"dual-model" 或 "mixed-user" 之一。

返回格式：
{
  "summary":"一句话总结本次整理结果",
  "items":[
    {
      "projectId":"已有项目ID",
      "projectName":"已有项目名",
      "question":"面试问题",
      "answer":"参考答案",
      "keywords":["关键词1","关键词2"],
      "source":"single-model",
      "confidence":0.91
    }
  ]
}`;

    model:modelEl.value.trim()
  });

function syncInterviewLabFromForm(){
  const lab=getInterviewLab();
  const modeEl=document.getElementById('interviewMode');
  const projectEl=document.getElementById('interviewProject');
  const interviewerPromptEl=document.getElementById('interviewerPrompt');

    },

function getEffectiveLLMConfig(which='primary'){
  const primary=syncLLMConfigFromForm();
  if(which==='primary')return primary;
  const secondary=syncSecondaryLLMConfigFromForm();
  return normalizeLLMConfig({
    baseUrl:secondary.baseUrl || primary.baseUrl,
    apiKey:secondary.apiKey || primary.apiKey,
    model:secondary.model || ''
  });
}

async function callLLM(messages,configOverride){
  const cfg=configOverride || syncLLMConfigFromForm();
  if(!cfg.baseUrl||!cfg.apiKey||!cfg.model)throw new Error('请先填写当前要调用模型的 Base URL、API Key 和 Model');
  const endpoint=getChatCompletionsEndpoint(cfg.baseUrl);
  const resp=await fetch(endpoint,{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization':`Bearer ${cfg.apiKey}`
    },
    body:JSON.stringify({
      model:cfg.model,
      temperature:0.35,
      messages
    })
  });
  if(!resp.ok){
    const text=await resp.text();
    throw new Error(`模型调用失败（${resp.status}）：${text.slice(0,300)}`);
  }
  const data=await resp.json();
  return extractAssistantText(data);
}

async function testLLMConnection(which='primary'){
  try{
    const label=which==='secondary'?'副模型':'主模型';
    setAIConnStatus('', `正在测试${label}连接…`);
    const cfg=getEffectiveLLMConfig(which);
    if(which==='secondary' && !cfg.model)throw new Error('双模型模式下请先填写副模型的 Model');
    const text=await callLLM([
      {role:'system',content:'你是一个接口连通性检查助手。只返回 {"ok":true,"message":"..."} 这样的 JSON。'},
      {role:'user',content:`请返回一个最小 JSON，确认${label}接口可用。`}
    ],cfg);
    const payload=extractJsonPayload(text);
    setAIConnStatus('ok', `${label}连接成功：${payload.message||'接口可用'}`);
  }catch(err){
    setAIConnStatus('err', err.message || '连接测试失败');
  }
}

function getInterviewProject(projectId){
  return state.projects.find(p=>p.id===projectId) || state.projects.find(p=>p.id==='default') || {id:'default',name:'默认分组'};
}

function buildProjectQuestionReference(projectId){
  const project=getInterviewProject(projectId);
  const related=state.questions.filter(q=>q.project===project.id).slice(0,12);
  if(!related.length)return `当前项目：${project.name}\n目前题库里还没有现成问答，请基于用户材料和项目名主动生成高质量深挖题。`;
  return [
    `当前项目：${project.name}`,
    '已有项目题库参考：',
    ...related.map((q,idx)=>`${idx+1}. ${q.q}\n答题要点：${q.answer.slice(0,180)}`)
  ].join('\n');
}

function buildInterviewTranscript(lab){
  return (lab.turns||[]).map((turn,idx)=>`Q${idx+1}：${turn.question}\nA${idx+1}：${turn.answer||'（候选人未作答）'}`).join('\n\n');
}

async function collectInterviewContextBundle(lab){
  const fileInput=document.getElementById('aiFilesInput');
  const files=fileInput&&fileInput.files?Array.from(fileInput.files):[];
  syncInterviewLabFromForm();
  let bundle={text:lab.cachedSourceText || '', unreadable:lab.cachedUnreadable || [], parseErrors:[]};
  if(files.length){
    bundle=await collectAISourceText(files,lab.contextText,lab.notesText);
    lab.cachedSourceText=bundle.text;
    lab.cachedUnreadable=bundle.unreadable;
    lab.sourceFiles=files.map(file=>file.name);
  }else if(!bundle.text){
    bundle=await collectAISourceText([],lab.contextText,lab.notesText);
    lab.cachedSourceText=bundle.text;
    lab.cachedUnreadable=bundle.unreadable;
  }
  save();
  if(bundle.parseErrors&&bundle.parseErrors.length){
    setAIRunStatus('err', bundle.parseErrors.join('； '));
  }
  return {
    bundle,
    projectText:buildProjectQuestionReference(lab.projectId),
    transcript:buildInterviewTranscript(lab)
  };
}

function ensureInterviewLimit(lab){
  if(lab.askedCount>=lab.maxQuestions){
    lab.status='complete';
    lab.complete=true;
    lab.paused=false;
    lab.notice='此项目题库已完成，建议先预览保存';
    save();
    setAIRunStatus('ok', lab.notice);
    return true;
  }
  return false;
}

function appendInterviewTurn(question,answer,meta={}){
  const lab=getInterviewLab();
  lab.turns.push({
    id:`turn_${Date.now()}_${Math.random().toString(36).slice(2,7)}`,
    question:(question||'').trim(),
    answer:(answer||'').trim(),
    questionSource:meta.questionSource || 'interviewer',
    answerSource:meta.answerSource || 'candidate',
    projectId:meta.projectId || lab.projectId,
    keywords:Array.isArray(meta.keywords)?meta.keywords.slice(0,6):[],
    createdAt:new Date().toISOString()
  });
  lab.notice='';
  save();
}

async function generateSingleTurn(lab,context){
  const project=getInterviewProject(lab.projectId);
  const text=await callLLM([
    {role:'system',content:`${lab.prompts.interviewer}\n\n${lab.prompts.candidate}\n\n你要一次性产出下一组“面试官提问 + 候选人回答”。只输出 JSON：{"question":"","answer":"","keywords":[""],"stop":false,"note":""}`},
    {role:'user',content:[
      '模式：单模型问答',
      `当前项目：${project.name}`,
      `已完成问题数：${lab.askedCount} / ${lab.maxQuestions}`,
      `已问问题：\n${lab.turns.map((turn,idx)=>`${idx+1}. ${turn.question}`).join('\n') || '暂无'}`,
      context.projectText,
      context.bundle.text?`补充材料：\n${context.bundle.text}`:''
    ].filter(Boolean).join('\n\n')}
  ],getEffectiveLLMConfig('primary'));
  return extractJsonPayload(text);
}

async function generateCandidateAnswer(lab,question,context){
  const project=getInterviewProject(lab.projectId);
  const text=await callLLM([
    {role:'system',content:`${lab.prompts.candidate}\n\n你负责只回答问题。只输出 JSON：{"answer":"","confidence":0.86}`},

function fallbackDraftFromInterview(lab){
  const project=getInterviewProject(lab.projectId);
  const items=(lab.turns||[]).filter(turn=>turn.answer).map((turn,idx)=>normalizeAIItem({
    projectId:project.id,
    projectName:project.name,
    question:turn.question,
    answer:turn.answer,
    keywords:(turn.keywords&&turn.keywords.length?turn.keywords:[project.name,'面试项目']).slice(0,6),
    source:lab.mode==='mixed'?'mixed-user':(lab.mode==='dual'?'dual-model':'single-model'),
    confidence:null
  },idx));
  return normalizeAIDraft({
    summary:`已从 ${project.name} 的模拟面试中整理出 ${items.length} 条问答`,
    items,
    updatedAt:new Date().toISOString(),
    sourceLabel:'模拟面试'
  });
}

function buildInterviewMarkdown(lab,draft){
  const project=getInterviewProject(lab.projectId);
  const transcript=buildInterviewTranscript(lab);
  const blocks=(draft.items||[]).map((item,idx)=>[
    `## ${idx+1}. ${item.question}`,
    '',
    `- 项目：${item.projectName||project.name}`,
    `- 来源：${item.source||'simulation'}`,
    item.keywords&&item.keywords.length?`- 关键词：${item.keywords.join(' / ')}`:null,
    '',
    item.answer
  ].filter(Boolean).join('\n')).join('\n\n');
  return [
    `# ${project.name} · 模拟面试整理`,
    '',
    `- 模式：${lab.mode==='single'?'单模型问答':lab.mode==='dual'?'双模型问答':'混合模式'}`,
    `- 问题数：${lab.askedCount}`,
    `- 生成时间：${new Date().toLocaleString()}`,
    '',
    '## 对话原文',
    '',
    transcript || '暂无对话内容',
    '',
    '## 结构化问答',
    '',
    blocks || '暂无结构化问答'
  ].join('\n');
}

async function previewInterviewDraft(){
  const lab=syncInterviewLabFromForm();
  const answered=(lab.turns||[]).filter(turn=>turn.answer);
  if(!answered.length){
    setAIRunStatus('err','至少先完成一轮有效问答，再预览整理结果');
    return;
  }
  try{
    aiBusy=true;
    setAIRunStatus('', '正在把模拟对话整理成结构化问答…');
    const context=await collectInterviewContextBundle(lab);
    const project=getInterviewProject(lab.projectId);
    let nextDraft=null;
    try{
      const text=await callLLM([
        {role:'system',content:`${lab.prompts.formatter}\n\n${AI_INTERVIEW_FORMATTER_SYSTEM_PROMPT}`},
        {role:'user',content:[
          `已有项目：\n${getProjectsPromptText()}`,
          `当前项目：${project.name}（${project.id}）`,
          `模拟模式：${lab.mode}`,
          context.projectText,
          context.bundle.text?`补充材料：\n${context.bundle.text}`:'',
          `模拟对话原文：\n${buildInterviewTranscript(lab)}`
        ].filter(Boolean).join('\n\n')}
      ],getEffectiveLLMConfig('primary'));
      const payload=extractJsonPayload(text);
      const items=(Array.isArray(payload.items)?payload.items:[]).map(normalizeAIItem).filter(item=>item.question&&item.answer);
      nextDraft=normalizeAIDraft({
        summary:payload.summary || `已从 ${project.name} 的模拟面试中整理出 ${items.length} 条问答`,
        items,
        updatedAt:new Date().toISOString(),
        sourceLabel:'模拟面试'
      });
    }catch(err){
      nextDraft=fallbackDraftFromInterview(lab);
    }
    state.aiDraft=nextDraft;
    lab.lastPreviewAt=new Date().toISOString();
    lab.markdown=buildInterviewMarkdown(lab,nextDraft);
    save();
    if(curTab==='ai')renderAIWorkbench(document.getElementById('main'));
    setAIRunStatus('ok', `预览已更新：整理出 ${(nextDraft.items||[]).length} 条结构化问答`);
  }catch(err){
    setAIRunStatus('err', err.message || '预览整理失败');
  }finally{
    aiBusy=false;
  }
}

function downloadInterviewMarkdown(){
  const lab=getInterviewLab();
  const draft=state.aiDraft||normalizeAIDraft({});
  if(!(draft.items||[]).length && !(lab.turns||[]).length){
    setAIRunStatus('err','当前没有可导出的模拟问答');
    return;
  }
  const markdown=lab.markdown || buildInterviewMarkdown(lab,draft.items&&draft.items.length?draft:fallbackDraftFromInterview(lab));
  const project=getInterviewProject(lab.projectId);
  const filename=`${project.name.replace(/[^\w\u4e00-\u9fa5-]+/g,'_')}_模拟面试整理.md`;
  const blob=new Blob([markdown],{type:'text/markdown;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  a.click();
  URL.revokeObjectURL(a.href);
  lab.lastSavedFilename=filename;
  lab.markdown=markdown;
  save();
  setAIRunStatus('ok', `Markdown 已保存：${filename}`);
}

function resetInterviewSession(clearDraft=true){
  const base=createDefaultInterviewLab();
  const lab=getInterviewLab();
  state.interviewLab=normalizeInterviewLab({
    ...base,
    mode:lab.mode,
    projectId:lab.projectId,
    prompts:lab.prompts,
    contextText:lab.contextText,
    notesText:lab.notesText,
    cachedSourceText:lab.cachedSourceText,
    cachedUnreadable:lab.cachedUnreadable,
    sourceFiles:lab.sourceFiles
  });
  if(clearDraft)state.aiDraft=normalizeAIDraft({});
  if(interviewRecording&&interviewRecordingOn)interviewRecording.stop();
  interviewRecording=null;
  interviewRecordingOn=false;
  save();
  if(curTab==='ai')renderAIWorkbench(document.getElementById('main'));
}

async function startInterviewSession(){
  const lab=syncInterviewLabFromForm();
  lab.turns=[];
  lab.askedCount=0;
  lab.status='running';
  lab.paused=false;
  lab.complete=false;
  lab.currentQuestion='';
  lab.currentQuestionKeywords=[];
  lab.currentUserAnswer='';
  lab.notice='';
  state.aiDraft=normalizeAIDraft({});
  save();
  await continueInterviewSession(true);
}

function pauseInterviewSession(){
  const lab=getInterviewLab();
  if(lab.complete)return;
  lab.paused=true;
  lab.status='paused';
  lab.notice='模拟已暂停，可稍后继续';
  save();
  if(curTab==='ai')renderAIWorkbench(document.getElementById('main'));
  setAIRunStatus('ok','模拟已暂停');
}

function resumeInterviewSession(){
  const lab=getInterviewLab();
  if(lab.complete)return;
  lab.paused=false;
  lab.status=lab.currentQuestion&&lab.mode==='mixed'?'await_user_answer':'running';
  lab.notice='';
  save();
  if(curTab==='ai')renderAIWorkbench(document.getElementById('main'));
  setAIRunStatus('ok','可以继续当前模拟');
}

async function continueInterviewSession(initialStart=false){
  if(aiBusy)return;
  const lab=syncInterviewLabFromForm();
  if(lab.paused){
    setAIRunStatus('err','当前模拟已暂停，请先点击继续');
    return;
  }
  if(ensureInterviewLimit(lab)){
    if(curTab==='ai')renderAIWorkbench(document.getElementById('main'));
    return;
  }
  if(lab.mode==='mixed' && lab.currentQuestion && !lab.currentUserAnswer.trim()){
    setAIRunStatus('err','请先提交当前问题的回答，再继续下一题');
    return;
  }
  try{
    aiBusy=true;
    setAIRunStatus('', initialStart?'正在启动模拟面试…':'正在生成下一题…');
    const context=await collectInterviewContextBundle(lab);
    if(lab.mode==='single'){
      const payload=await generateSingleTurn(lab,context);
      if(payload.stop){
        lab.complete=true;
        lab.status='complete';
        lab.notice=payload.note || '此项目题库已完成，建议先预览保存';
        save();
        setAIRunStatus('ok', lab.notice);
      }else{
        lab.askedCount+=1;
        appendInterviewTurn(payload.question,payload.answer,{
          questionSource:'single-model',
          answerSource:'single-model',
          projectId:lab.projectId,
          keywords:Array.isArray(payload.keywords)?payload.keywords:[]
        });
        if(ensureInterviewLimit(lab))setAIRunStatus('ok', lab.notice || '此项目题库已完成，建议先预览保存');
        else setAIRunStatus('ok', `已完成第 ${lab.askedCount} 题，继续可生成下一题`);
      }
    }else{
      const questionPayload=await generateInterviewerQuestion(lab,context);
      if(questionPayload.stop){
        lab.complete=true;
        lab.status='complete';
        lab.notice=questionPayload.note || '此项目题库已完成，建议先预览保存';
        save();
        setAIRunStatus('ok', lab.notice);
      }else if(lab.mode==='dual'){
        const answerPayload=await generateCandidateAnswer(lab,questionPayload.question,context);
        lab.askedCount+=1;
        appendInterviewTurn(questionPayload.question,answerPayload.answer,{
          questionSource:'primary-model',
          answerSource:'secondary-model',
          projectId:lab.projectId,
          keywords:Array.isArray(questionPayload.keywords)?questionPayload.keywords:[]
        });
        if(ensureInterviewLimit(lab))setAIRunStatus('ok', lab.notice || '此项目题库已完成，建议先预览保存');
        else setAIRunStatus('ok', `双模型已完成第 ${lab.askedCount} 题，继续可生成下一题`);
      }else{
        lab.askedCount+=1;
        lab.currentQuestion=questionPayload.question || '';
        lab.currentQuestionKeywords=Array.isArray(questionPayload.keywords)?questionPayload.keywords.slice(0,6):[];
        lab.currentUserAnswer='';
        lab.status='await_user_answer';
        lab.notice='请回答当前问题，提交后再继续';
        save();
        setAIRunStatus('ok', `已生成第 ${lab.askedCount} 题，请先回答`);
      }
    }
    save();
    if(curTab==='ai')renderAIWorkbench(document.getElementById('main'));
  }catch(err){
    setAIRunStatus('err', err.message || '模拟面试生成失败');
  }finally{
    aiBusy=false;
  }
}

async function submitMixedInterviewAnswer(){
  const lab=syncInterviewLabFromForm();
  const answer=lab.currentUserAnswer.trim();
  if(!lab.currentQuestion){
    setAIRunStatus('err','当前没有待回答的问题');
    return;
  }
  if(!answer){
    setAIRunStatus('err','请先输入或录入你的回答');
    return;
  }
  appendInterviewTurn(lab.currentQuestion,answer,{
    questionSource:'primary-model',
    answerSource:'user',
    projectId:lab.projectId,
    keywords:lab.currentQuestionKeywords||[]
  });
  lab.currentQuestion='';
  lab.currentQuestionKeywords=[];
  lab.currentUserAnswer='';
  lab.status=ensureInterviewLimit(lab)?'complete':'running';
  lab.notice=lab.complete?'此项目题库已完成，建议先预览保存':'回答已保存，可继续下一题或先预览';
  save();
  if(curTab==='ai')renderAIWorkbench(document.getElementById('main'));
  setAIRunStatus('ok', lab.notice);
}

function toggleInterviewRecording(){
  const input=document.getElementById('mixedAnswerInput');
  const btn=document.getElementById('mixRecordBtn');
  if(!input){
    setAIRunStatus('err','混合模式下才需要录音输入');
    return;
  }
  const SR=window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    setAIRunStatus('err','当前浏览器不支持语音转文字，请直接输入回答');
    return;
  }
  if(interviewRecordingOn && interviewRecording){
    interviewRecording.stop();
    if(btn)btn.textContent='开始录音';
    return;
  }
  const baseText=input.value;
  let finalText='';
  interviewRecording=new SR();
  interviewRecording.lang='zh-CN';
  interviewRecording.continuous=true;
  interviewRecording.interimResults=true;
  interviewRecordingOn=true;
  interviewRecording.onresult=(event)=>{
    let interim='';
    for(let i=event.resultIndex;i<event.results.length;i++){
      const transcript=event.results[i][0]?.transcript || '';
      if(event.results[i].isFinal)finalText+=transcript;
      else interim+=transcript;
    }
    input.value=[baseText,finalText,interim].filter(Boolean).join(baseText&&(finalText||interim)?'\n':'');
    saveCurrentMixedAnswerFromForm();
  };
  interviewRecording.onerror=()=>setAIRunStatus('err','录音识别失败，请改用手动输入');
  interviewRecording.onend=()=>{
    interviewRecordingOn=false;
    interviewRecording=null;
    if(btn)btn.textContent='开始录音';
    if(curTab==='ai')renderAIWorkbench(document.getElementById('main'));
  };
  interviewRecording.start();
  if(btn)btn.textContent='停止录音';
  setAIRunStatus('ok','录音已开始，识别文字会自动写入回答框');
}

function importAIDraft(){
  const items=state.aiDraft.items||[];
  if(!items.length){setAIRunStatus('err','当前没有可导入的 AI 草稿');return}
  if(!confirm(`确认把 ${items.length} 条预览问答映射到题库吗？系统会自动跳过重复题。`))return;
  let added=0,skipped=0;
  items.forEach(item=>{
    const exists=state.questions.some(q=>q.project===item.projectId && q.q.trim()===item.question.trim());
    if(exists){skipped++;return}
    state.questions.push(normalizeQuestion({
      id:Date.now()+Math.random(),
      project:item.projectId,
      q:item.question,
      answer:item.answer,
      keywords:item.keywords,
      level:'red',
      practiced:0,
      lastPracticed:null,
      score:0,
      nextReviewAt:new Date().toISOString(),
      intervalDays:0,
      streak:0,
      lapseCount:0,
      lastResult:null
    }));
    added++;
  });
  save();
  updateHd();
  setAIRunStatus('ok', `已导入 ${added} 条问答${skipped?`，跳过 ${skipped} 条重复题目`:''}`);
}
